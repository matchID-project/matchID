      - FILES_TO_PROCESS
      - DATAGOUV_CONNECTOR
      - ES_PRELOAD
      - CHUNK_SIZE
      - RECIPE_THREADS
      - RECIPE_QUEUE
      - DATAPREP_PROJECT_NAME
      - DATAPREP_PROJECT_SOURCE_PATH
    volumes:
      - ${DATAPREP_PROJECT_SOURCE_PATH}:/${APP_GROUP}/projects/${DATAPREP_PROJECT_NAME}
