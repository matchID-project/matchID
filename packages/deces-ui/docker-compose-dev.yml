# this docker configuation is for dev use only

services:
  nginx-development:
    image: ${DOCKER_USERNAME}/deces-ui-nginx-development:${APP_VERSION}
    build:
      context: ${NGINX_PATH}
      target: development
      dockerfile: Dockerfile
      args:
        app_name: ${APP_FRONTEND}
        app_ver: ${APP_VERSION}
    container_name: deces-ui-nginx-development
    depends_on:
      - frontend-development
    environment:
      - APP
      - PORT
      - FRONTEND_DEV_HOST
      - FRONTEND_DEV_PORT
      - BACKEND_PROXY_PATH
      - BACKEND_PORT
      - BACKEND_HOST
      - ES_HOST
      - ES_INDEX
      - ES_PORT
      - DATAGOUV_PROXY_PATH
      - DATAGOUV_RESOURCES_PROXY
      - DATAGOUV_RESOURCES_REWRITE_PATH
      - API_SEARCH_LIMIT_RATE
      - API_SEARCH_USER_BURST
      - API_SEARCH_GLOBAL_LIMIT_RATE
      - API_SEARCH_GLOBAL_BURST
      - API_BULK_SUBMIT_LIMIT_RATE
      - API_BULK_SUBMIT_BURST
      - API_MISC_LIMIT_RATE
      - API_MISC_USER_BURST
      - API_MISC_GLOBAL_LIMIT_RATE
      - API_MISC_GLOBAL_BURST
      - API_AGG_LIMIT_RATE
      - API_AGG_USER_BURST
      - API_AGG_GLOBAL_LIMIT_RATE
      - API_AGG_GLOBAL_BURST
      - API_DOWNLOAD_LIMIT_RATE
      - API_USER_SCOPE
      - API_SEND_TIMEOUT
      - API_READ_TIMEOUT
      - API_MAX_BODY
      - GOOGLE_ANALYTICS_ID
      - GOOGLE_ADSENSE_ID
    volumes:
      - ${NGINX_PATH}/default-dev.template:/etc/nginx/conf.d/default.template
      - ${NGINX_PATH}/nginx-dev.template:/etc/nginx/nginx.template
      - ${FRONTEND_PATH}/public:/usr/share/nginx/html
    ports:
      - ${PORT}:${PORT}
      - "35729:35729"
    restart: always

  frontend-development:
    build:
      context: ${FRONTEND_PATH}
      dockerfile: Dockerfile
      target: development
      args:
        http_proxy: ${http_proxy}
        https_proxy: ${https_proxy}
        no_proxy: ${no_proxy}
        npm_registry: ${NPM_REGISTRY}
        sass_registry: ${SASS_REGISTRY}
        MIRROR_DEBIAN: ${MIRROR_DEBIAN}
        app_path: /${APP_FRONTEND}
        app_name: ${APP_FRONTEND}
        app_ver: ${APP_VERSION}
        NPM_FIX: ${NPM_FIX}
        NPM_LATEST: ${NPM_LATEST}
        NPM_GIT: ${NPM_GIT}
        NPM_VERBOSE: ${NPM_VERBOSE}
        FRONTEND_DEV_PORT: ${FRONTEND_DEV_PORT}
    image: ${DOCKER_USERNAME}/deces-ui-frontend-development:${APP_VERSION}
    container_name: deces-ui-frontend-development
    environment:
      APP: ${APP_FRONTEND}
      PORT: ${FRONTEND_DEV_PORT}
      HOST: 0.0.0.0
      AB_THRESHOLD: ${AB_THRESHOLD}
      API_EMAIL: ${API_EMAIL}
      API_MAX_BODY: ${API_MAX_BODY}
      ES_MAX_RESULTS: ${ES_MAX_RESULTS}
      BACKEND_TOKEN_USER: ${BACKEND_TOKEN_USER}
      BACKEND_PROXY_PATH: ${BACKEND_PROXY_PATH}
      DATAGOUV_PROXY_PATH: ${DATAGOUV_PROXY_PATH}
      DATAGOUV_CATALOG_URL: ${DATAGOUV_CATALOG_URL}
      DATAGOUV_RESOURCES_URL: ${DATAGOUV_RESOURCES_URL}
      MITM_URL: ${MITM_URL}
      THEME_DNUM: ${THEME_DNUM}
    volumes:
      - ${FRONTEND_PATH}/public:/${APP_FRONTEND}/public
      - ${STATS}:/${APP_FRONTEND}/public/stats
      - ${FRONTEND_PATH}/.eslintrc.js:/${APP_FRONTEND}/.eslintrc.js
      - ${FRONTEND_PATH}/rollup.config.js:/${APP_FRONTEND}/rollup.config.js
      - ${FRONTEND_PATH}/src:/${APP_FRONTEND}/src/
      - /${APP_FRONTEND}/node_modules

networks:
  default:
    external:
      name: ${DC_NETWORK}
