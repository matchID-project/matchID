# PoC overlay : pin ES to the Scaleway-managed `burst` pool
# (DEV1-L, 0..3 autoscaled).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
spec:
  # Burst-mode: at rest the namespace consumes 0 CPU / 0 RAM. A test
  # session scales ES → 1 before the backend Deployment ramps up.
  replicas: 0
  template:
    spec:
      nodeSelector:
        k8s.scaleway.com/pool-name: burst
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: scw-bssd
        resources:
          requests:
            storage: 5Gi
