name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tools: ${{ steps.filter.outputs.tools }}
      dataprep_backend: ${{ steps.filter.outputs.dataprep_backend }}
      dataprep_frontend: ${{ steps.filter.outputs.dataprep_frontend }}
      deces_backend: ${{ steps.filter.outputs.deces_backend }}
      deces_ui: ${{ steps.filter.outputs.deces_ui }}
      deces_dataprep: ${{ steps.filter.outputs.deces_dataprep }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tools:
              - 'Makefile'
              - 'packages/tools/**'
              - '.github/workflows/ci.yml'
            dataprep_backend:
              - 'Makefile'
              - 'packages/dataprep-backend/**'
              - 'packages/deces-dataprep/**'
              - 'packages/tools/**'
              - '.github/workflows/ci.yml'
            dataprep_frontend:
              - 'Makefile'
              - 'packages/dataprep-frontend/**'
              - 'packages/dataprep-backend/**'
              - 'packages/deces-dataprep/**'
              - 'packages/tools/**'
              - '.github/workflows/ci.yml'
            deces_backend:
              - 'Makefile'
              - 'packages/deces-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - '.github/workflows/ci.yml'
            deces_ui:
              - 'Makefile'
              - 'packages/deces-ui/**'
              - 'packages/deces-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - '.github/workflows/ci.yml'
            deces_dataprep:
              - 'Makefile'
              - 'packages/deces-dataprep/**'
              - 'packages/dataprep-backend/**'
              - 'packages/dataprep-frontend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  tools-swift:
    name: build docker swift
    needs: changes
    if: needs.changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Config
        run: make -C packages/tools config
      - name: Build docker swift
        run: make -C packages/tools docker-check CLOUD_CLI=swift || make -C packages/tools docker-build CLOUD_CLI=swift

  dataprep-backend-test:
    name: dataprep-backend pull request test
    needs: changes
    if: needs.changes.outputs.dataprep_backend == 'true'
    runs-on: ubuntu-latest
    env:
      TOOLS_PATH: ${{ github.workspace }}/packages/tools
      DATAPREP_PROJECT_NAME: deces-dataprep
      DATAPREP_PROJECT_SOURCE_PATH: ${{ github.workspace }}/packages/deces-dataprep/projects/deces-dataprep
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure monorepo dataprep backend
        run: make -C packages/deces-dataprep config
      - name: Build or reuse backend image and run tests
        run: make -C packages/dataprep-backend version backend-docker-check GIT_BRANCH=${GITHUB_REF_NAME} || ( make -C packages/dataprep-backend backend-build GIT_BRANCH=${GITHUB_REF_NAME} && make -C packages/dataprep-backend backend tests backend-stop GIT_BRANCH=${GITHUB_REF_NAME} )

  dataprep-frontend-test:
    name: dataprep-frontend pull request test
    needs: changes
    if: needs.changes.outputs.dataprep_frontend == 'true'
    runs-on: ubuntu-latest
    env:
      BACKEND: ${{ github.workspace }}/packages/dataprep-backend
      BACKEND_DC_IMAGE_NAME: matchid-backend
      TOOLS_PATH: ${{ github.workspace }}/packages/tools
      DATAPREP_PROJECT_NAME: deces-dataprep
      DATAPREP_PROJECT_SOURCE_PATH: ${{ github.workspace }}/packages/deces-dataprep/projects/deces-dataprep
      NPM_AUDIT_IGNORE: "true"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure monorepo dataprep frontend
        run: make -C packages/deces-dataprep config frontend-config
      - name: Build or reuse frontend image and start stack
        run: |
          make -C packages/dataprep-frontend version-files
          make -C packages/dataprep-frontend version
          make -C packages/dataprep-frontend frontend-docker-check || make -C packages/dataprep-frontend build backend-docker-check up

  deces-backend-build:
    name: deces-backend build docker image and tests
    needs: changes
    if: needs.changes.outputs.deces_backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=${GITHUB_REF_NAME}
      - name: Make deploy dependencies
        run: make -C packages/deces-backend NPM_AUDIT_DRY_RUN=true deploy-dependencies GIT_BRANCH=${GITHUB_REF_NAME}
        env:
          FILES_TO_PROCESS: deces-2020-m01.txt.gz
          REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
          ES_MEM: 1024m
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Run backend vitest tests
        run: make -C packages/deces-backend NPM_AUDIT_DRY_RUN=true backend-test-vitest GIT_BRANCH=${GITHUB_REF_NAME}
      - name: Stop backend test dependencies
        if: always()
        run: make -C packages/deces-backend backend-redis-stop backend-smtp-stop GIT_BRANCH=${GITHUB_REF_NAME}

  deces-ui-pull-request-test:
    name: deces-ui pull request test
    needs: changes
    if: needs.changes.outputs.deces_ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Config
        run: make version config GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      - name: Build or reuse frontend image
        run: make frontend-docker-check GIT_BRANCH=${GIT_BRANCH} || make APP=deces-ui build GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      - name: Build backend image for deploy-local
        run: make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      - name: Deploy local and run backend/frontend tests
        run: make deploy-local backend-test frontend-test GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
          FILES_TO_PROCESS: deces-2020-m01.txt.gz
          REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
          API_SEARCH_LIMIT_RATE: 10r/s
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          TOOLS_STORAGE_ACCESS_KEY: ${{ secrets.TOOLS_STORAGE_ACCESS_KEY }}
          TOOLS_STORAGE_SECRET_KEY: ${{ secrets.TOOLS_STORAGE_SECRET_KEY }}
          LOG_BUCKET: ${{ secrets.LOG_BUCKET }}
          LOG_DB_BUCKET: ${{ secrets.LOG_DB_BUCKET }}
          STATS_BUCKET: ${{ secrets.STATS_BUCKET }}
          PROOFS_BUCKET: ${{ secrets.PROOFS_BUCKET }}
          BACKEND_TOKEN_KEY: ${{ secrets.BACKEND_TOKEN_KEY }}
          BACKEND_TOKEN_PASSWORD: ${{ secrets.BACKEND_TOKEN_PASSWORD }}

  deces-dataprep-locally:
    name: deces-dataprep locally
    needs: changes
    if: needs.changes.outputs.deces_dataprep == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run small dataset
        run: |
          make -C packages/deces-dataprep all FILES_TO_PROCESS=${FILES_TO_PROCESS} \
            REPOSITORY_BUCKET=${REPOSITORY_BUCKET} \
            CHUNK_SIZE=${CHUNK_SIZE} ES_THREADS=${ES_THREADS} RECIPE_THREADS=${RECIPE_THREADS} ES_MEM=${ES_MEM}
        env:
          FILES_TO_PROCESS: deces-2020-m01.txt.gz
          REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
          CHUNK_SIZE: 5000
          ES_THREADS: 2
          RECIPE_THREADS: 2
          ES_MEM: 1024m
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
