name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact_matchid_backend: ${{ steps.detect.outputs.artifact_matchid_backend }}
      artifact_matchid_frontend: ${{ steps.detect.outputs.artifact_matchid_frontend }}
      artifact_deces_backend: ${{ steps.detect.outputs.artifact_deces_backend }}
      artifact_deces_ui: ${{ steps.detect.outputs.artifact_deces_ui }}
      artifact_dataprep_snapshot: ${{ steps.detect.outputs.artifact_dataprep_snapshot }}
      integration_stack: ${{ steps.detect.outputs.integration_stack }}
      tools: ${{ steps.detect.outputs.tools }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve artifact and integration flags
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          BASE_COMMIT="$(git merge-base "${BASE_SHA}" "${HEAD_SHA}")"
          git diff --name-only "${BASE_COMMIT}" "${HEAD_SHA}" | LC_ALL=C sort -u > /tmp/changed-files.txt
          touch /tmp/changed-files.txt

          prefixed_version_files() {
            local dir="$1"
            make -s -C "${dir}" version-files | sed "s#^#${dir}/#" | LC_ALL=C sort -u
          }

          emit_flag() {
            echo "$1=$2" >> "${GITHUB_OUTPUT}"
          }

          resolve_artifact_flag() {
            local name="$1"
            local dir="$2"
            local files="/tmp/${name}.files"
            prefixed_version_files "${dir}" > "${files}"
            if grep -Fxf "${files}" /tmp/changed-files.txt > /dev/null 2>&1; then
              emit_flag "${name}" true
            else
              emit_flag "${name}" false
            fi
          }

          resolve_artifact_flag artifact_matchid_backend packages/dataprep-backend
          resolve_artifact_flag artifact_matchid_frontend packages/dataprep-frontend
          resolve_artifact_flag artifact_deces_backend packages/deces-backend
          resolve_artifact_flag artifact_deces_ui packages/deces-ui
          resolve_artifact_flag artifact_dataprep_snapshot packages/deces-dataprep

          if grep -Eq '^(Makefile$|packages/tools/|\.github/workflows/ci\.yml$)' /tmp/changed-files.txt; then
            emit_flag tools true
          else
            emit_flag tools false
          fi

          if grep -Eq '^(Makefile$|packages/tools/|packages/deces-infra/|scripts/|\.github/workflows/(ci|cd|release-prod)\.yml$)' /tmp/changed-files.txt; then
            emit_flag integration_stack true
          else
            emit_flag integration_stack false
          fi

  tools-swift:
    name: build docker swift
    needs: changes
    if: needs.changes.outputs.tools == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Config
        run: make -C packages/tools config
      - name: Build docker swift
        run: make -C packages/tools docker-check CLOUD_CLI=swift || make -C packages/tools docker-build CLOUD_CLI=swift

  dataprep-backend-test:
    name: dataprep-backend pull request test
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.artifact_matchid_backend == 'true' ||
        needs.changes.outputs.integration_stack == 'true'
      }}
    runs-on: ubuntu-latest
    env:
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      TOOLS_PATH: ${{ github.workspace }}/packages/tools
      DATAPREP_PROJECT_NAME: deces-dataprep
      DATAPREP_PROJECT_SOURCE_PATH: ${{ github.workspace }}/packages/deces-dataprep/projects/deces-dataprep
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Resolve matchid-backend version
        id: dataprep_backend_version
        run: echo "app_version=$(make -s -C packages/dataprep-backend version | awk '{print $NF}')" >> "${GITHUB_OUTPUT}"
      - name: Configure monorepo dataprep backend
        run: make -C packages/deces-dataprep config
      - name: Build or reuse backend image
        run: make -C packages/dataprep-backend backend-docker-check GIT_BRANCH=${GIT_BRANCH} || make -C packages/dataprep-backend backend-build GIT_BRANCH=${GIT_BRANCH}
      - name: Run dataprep-backend tests
        run: make -C packages/dataprep-backend backend tests backend-stop GIT_BRANCH=${GIT_BRANCH}
      - name: Save matchid-backend image artifact
        run: docker save matchid/matchid-backend:${{ steps.dataprep_backend_version.outputs.app_version }} | gzip > /tmp/matchid-backend-image.tar.gz
      - name: Upload matchid-backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: matchid-backend-image
          path: /tmp/matchid-backend-image.tar.gz
          if-no-files-found: error

  dataprep-frontend-test:
    name: dataprep-frontend pull request test
    needs:
      - changes
      - dataprep-backend-test
    if: >-
      ${{
        always() &&
        !cancelled() &&
        (
          needs.dataprep-backend-test.result == 'success' ||
          needs.dataprep-backend-test.result == 'skipped'
        ) && (
        needs.changes.outputs.artifact_matchid_frontend == 'true' ||
        needs.changes.outputs.artifact_matchid_backend == 'true' ||
        needs.changes.outputs.integration_stack == 'true'
        )
      }}
    runs-on: ubuntu-latest
    env:
      BACKEND: ${{ github.workspace }}/packages/dataprep-backend
      BACKEND_DC_IMAGE_NAME: matchid-backend
      TOOLS_PATH: ${{ github.workspace }}/packages/tools
      DATAPREP_PROJECT_NAME: deces-dataprep
      DATAPREP_PROJECT_SOURCE_PATH: ${{ github.workspace }}/packages/deces-dataprep/projects/deces-dataprep
      NPM_AUDIT_IGNORE: "true"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure monorepo dataprep frontend
        run: make -C packages/deces-dataprep config frontend-config
      - name: Download matchid-backend image artifact
        if: needs.dataprep-backend-test.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: matchid-backend-image
          path: /tmp
      - name: Load matchid-backend image artifact
        if: needs.dataprep-backend-test.result == 'success'
        run: docker load -i /tmp/matchid-backend-image.tar.gz
      - name: Build or reuse frontend image and start stack
        run: |
          make -C packages/dataprep-frontend version-files
          make -C packages/dataprep-frontend version
          make -C packages/dataprep-frontend frontend-docker-check GIT_BRANCH=dev GIT_BACKEND_BRANCH=dev || make -C packages/dataprep-frontend build backend-docker-check up GIT_BRANCH=dev GIT_BACKEND_BRANCH=dev

  deces-backend-build:
    name: deces-backend build docker image
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.artifact_deces_backend == 'true' ||
        needs.changes.outputs.integration_stack == 'true'
      }}
    runs-on: ubuntu-latest
    env:
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build or reuse backend image
        run: make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true docker-check-backend GIT_BRANCH=${GIT_BRANCH} || make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=${GIT_BRANCH}

  deces-backend-tests:
    name: deces-backend tests
    needs:
      - changes
      - deces-dataprep-locally
    if: >-
      ${{
        (
          needs.deces-dataprep-locally.result == 'success' ||
          needs.deces-dataprep-locally.result == 'skipped'
        ) && (
          needs.changes.outputs.artifact_deces_backend == 'true' ||
          needs.changes.outputs.artifact_dataprep_snapshot == 'true' ||
          needs.changes.outputs.artifact_matchid_backend == 'true' ||
          needs.changes.outputs.integration_stack == 'true'
        )
      }}
    runs-on: ubuntu-latest
    env:
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build or reuse backend image
        run: make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true docker-check-backend GIT_BRANCH=${GIT_BRANCH} || make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=${GIT_BRANCH}
      - name: Make deploy dependencies
        run: make -C packages/deces-backend NPM_AUDIT_DRY_RUN=true deploy-dependencies GIT_BRANCH=${GIT_BRANCH}
        env:
          FILES_TO_PROCESS: deces-2020-m01.txt.gz
          REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
          ES_MEM: 1024m
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Run backend vitest tests
        run: make -C packages/deces-backend DATA_DIR=${GITHUB_WORKSPACE}/packages/deces-backend/data NPM_AUDIT_DRY_RUN=true backend-test-vitest GIT_BRANCH=${GIT_BRANCH}
      - name: Stop backend test dependencies
        if: always()
        run: make -C packages/deces-backend backend-redis-stop backend-smtp-stop GIT_BRANCH=${GIT_BRANCH}

  deces-backend-artillery:
    name: deces-backend perf artillery
    needs:
      - changes
      - deces-dataprep-locally
      - deces-backend-tests
    if: >-
      ${{
        (
          needs.deces-dataprep-locally.result == 'success' ||
          needs.deces-dataprep-locally.result == 'skipped'
        ) &&
        (
          needs.deces-backend-tests.result == 'success' ||
          needs.deces-backend-tests.result == 'skipped'
        ) && (
          needs.changes.outputs.artifact_deces_backend == 'true' ||
          needs.changes.outputs.artifact_dataprep_snapshot == 'true' ||
          needs.changes.outputs.artifact_matchid_backend == 'true' ||
          needs.changes.outputs.integration_stack == 'true'
        )
      }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build or reuse backend image
        run: make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true docker-check-backend GIT_BRANCH=${GIT_BRANCH} || make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=${GIT_BRANCH}
      - name: Make deploy dependencies
        run: make -C packages/deces-backend NPM_AUDIT_DRY_RUN=true deploy-dependencies GIT_BRANCH=${GIT_BRANCH}
        env:
          FILES_TO_PROCESS: deces-2020-m01.txt.gz
          REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
          ES_MEM: 1024m
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Start backend stack
        run: make -C packages/deces-backend backend-start GIT_BRANCH=${GIT_BRANCH}
      - name: Run artillery scenario
        run: make -C packages/deces-backend test-perf-v1 GIT_BRANCH=${GIT_BRANCH}
      - name: Stop perf dependencies
        if: always()
        run: |
          make -C packages/deces-backend backend-stop backend-redis-stop backend-smtp-stop GIT_BRANCH=${GIT_BRANCH}
          make -C packages/deces-infra elasticsearch-stop GIT_BRANCH=${GIT_BRANCH}

  deces-ui-pull-request-test:
    name: deces-ui pull request test
    needs:
      - changes
      - deces-dataprep-locally
      - deces-backend-tests
    if: >-
      ${{
        (
          needs.deces-dataprep-locally.result == 'success' ||
          needs.deces-dataprep-locally.result == 'skipped'
        ) &&
        (
          needs.deces-backend-tests.result == 'success' ||
          needs.deces-backend-tests.result == 'skipped'
        ) && (
          needs.changes.outputs.artifact_deces_ui == 'true' ||
          needs.changes.outputs.artifact_deces_backend == 'true' ||
          needs.changes.outputs.artifact_dataprep_snapshot == 'true' ||
          needs.changes.outputs.artifact_matchid_backend == 'true' ||
          needs.changes.outputs.integration_stack == 'true'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Config
        run: make version config GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      - name: Build or reuse frontend image
        run: make frontend-docker-check GIT_BRANCH=${GIT_BRANCH} || make APP=deces-ui build GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      - name: Build or reuse backend image for deploy-local
        run: make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true docker-check-backend GIT_BRANCH=${GIT_BRANCH} || make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      - name: Deploy local and run backend/frontend tests
        run: make deploy-local backend-test frontend-test GIT_BRANCH=${GIT_BRANCH}
        env:
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
          FILES_TO_PROCESS: deces-2020-m01.txt.gz
          REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
          API_SEARCH_LIMIT_RATE: 10r/s
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          TOOLS_STORAGE_ACCESS_KEY: ${{ secrets.TOOLS_STORAGE_ACCESS_KEY }}
          TOOLS_STORAGE_SECRET_KEY: ${{ secrets.TOOLS_STORAGE_SECRET_KEY }}
          LOG_BUCKET: ${{ secrets.LOG_BUCKET }}
          LOG_DB_BUCKET: ${{ secrets.LOG_DB_BUCKET }}
          STATS_BUCKET: ${{ secrets.STATS_BUCKET }}
          PROOFS_BUCKET: ${{ secrets.PROOFS_BUCKET }}
          BACKEND_TOKEN_KEY: ${{ secrets.BACKEND_TOKEN_KEY }}
          BACKEND_TOKEN_PASSWORD: ${{ secrets.BACKEND_TOKEN_PASSWORD }}

  deces-dataprep-locally:
    name: deces-dataprep locally
    needs:
      - changes
      - dataprep-backend-test
    if: >-
      ${{
        (
          needs.dataprep-backend-test.result == 'success' ||
          needs.dataprep-backend-test.result == 'skipped'
        ) && (
        needs.changes.outputs.artifact_dataprep_snapshot == 'true' ||
        needs.changes.outputs.artifact_matchid_backend == 'true' ||
        needs.changes.outputs.integration_stack == 'true'
        )
      }}
    runs-on: ubuntu-latest
    env:
      GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure local dataprep stack
        run: make -C packages/deces-dataprep config
      - name: Download matchid-backend image artifact
        if: needs.dataprep-backend-test.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: matchid-backend-image
          path: /tmp
      - name: Load matchid-backend image artifact
        if: needs.dataprep-backend-test.result == 'success'
        run: docker load -i /tmp/matchid-backend-image.tar.gz
      - name: Run small dataset
        run: |
          make -C packages/deces-dataprep all GIT_BRANCH=${GIT_BRANCH} FILES_TO_PROCESS=${FILES_TO_PROCESS} \
            REPOSITORY_BUCKET=${REPOSITORY_BUCKET} \
            CHUNK_SIZE=${CHUNK_SIZE} ES_THREADS=${ES_THREADS} RECIPE_THREADS=${RECIPE_THREADS} ES_MEM=${ES_MEM}
        env:
          FILES_TO_PROCESS: deces-2020-m01.txt.gz
          REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
          CHUNK_SIZE: 5000
          ES_THREADS: 2
          RECIPE_THREADS: 2
          ES_MEM: 1024m
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}

  deces-dataprep-year-remote-ci-hack:
    name: deces-dataprep year remote CI hack
    needs:
      - changes
      - dataprep-backend-test
      - deces-dataprep-locally
    if: >-
      ${{
        always() &&
        !cancelled() &&
        (
          needs.dataprep-backend-test.result == 'success' ||
          needs.dataprep-backend-test.result == 'skipped'
        ) &&
        (
          needs.deces-dataprep-locally.result == 'success' ||
          needs.deces-dataprep-locally.result == 'skipped'
        ) && (
          needs.changes.outputs.artifact_dataprep_snapshot == 'true' ||
          needs.changes.outputs.artifact_matchid_backend == 'true' ||
          needs.changes.outputs.integration_stack == 'true'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      CD_GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
      FILES_TO_PROCESS: deces-2020-m[0-1][0-9].txt.gz
      REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
      CHUNK_SIZE: 75000
      ES_THREADS: 14
      RECIPE_THREADS: 16
      RECIPE_QUEUE: 18
      ES_MEM: 30000m
    steps:
      - uses: actions/checkout@v4
      # TEMP LOT8 CI HACK: copied from cd.yml to force a real dataprep year remote run.
      # Revert this job after the Resolute/SBS base image has been validated in CI.
      - name: Install dataprep deploy SSH key
        run: |
          test -n "${SSH_PRIVATE_KEY}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa_matchID"
          chmod 600 "${HOME}/.ssh/id_rsa_matchID"
          ssh-keygen -y -f "${HOME}/.ssh/id_rsa_matchID" > "${HOME}/.ssh/id_rsa_matchID.pub"
          chmod 644 "${HOME}/.ssh/id_rsa_matchID.pub"
          export SSH_AUTH_SOCK=/tmp/ssh_agent.sock
          ssh-agent -a "${SSH_AUTH_SOCK}" > /dev/null
          ssh-add "${HOME}/.ssh/id_rsa_matchID"
          sanitize_host() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#http://}"
            value="${value#https://}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value##*@}"; fi
            value="${value%%/*}"
            if [[ "${value}" =~ ^\[[^]]+\]:[0-9]+$ ]]; then
              value="${value#\[}"
              value="${value%%\]:*}"
            elif [[ "${value}" =~ ^[^:]+:[0-9]+$ ]]; then
              value="${value%%:*}"
            fi
            printf '%s' "${value}"
          }
          sanitize_user() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value%%@*}"; fi
            printf '%s' "${value}"
          }
          BASTION_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          BASTION_USER_RESOLVED=ubuntu
          NGINX_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          NGINX_USER_RESOLVED="$(sanitize_user "${NGINX_USER}")"
          BASTION_SOURCE=nginx
          if [ -z "${BASTION_HOST_RESOLVED}" ]; then BASTION_HOST_RESOLVED="$(sanitize_host "${BASTION_HOST}")"; fi
          if [ -z "${BASTION_USER_RESOLVED}" ]; then BASTION_USER_RESOLVED="$(sanitize_user "${BASTION_USER}")"; fi
          if [ -z "${NGINX_HOST_RESOLVED}" ]; then NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"; fi
          if [ -z "${NGINX_USER_RESOLVED}" ]; then NGINX_USER_RESOLVED=ubuntu; fi
          if [ -z "$(sanitize_host "${NGINX_HOST}")" ]; then BASTION_SOURCE=bastion; fi
          echo "bastion_source=${BASTION_SOURCE}"
          if printf '%s' "${BASTION_HOST_RESOLVED}" | grep -Eq '^[0-9.]+$'; then
            echo "bastion_input_host_kind=ip"
          else
            echo "bastion_input_host_kind=name"
          fi
          if getent hosts "${BASTION_HOST_RESOLVED}" >/dev/null 2>&1; then
            echo "bastion_input_host_resolves=yes"
          else
            echo "bastion_input_host_resolves=no"
            # Temporary fallback while monorepo runner secrets still expose a non-resolving bastion host.
            BASTION_HOST_RESOLVED=163.172.185.238
            BASTION_SOURCE=fallback_ip
            echo "bastion_source=${BASTION_SOURCE}"
            echo "bastion_input_host_kind=ip"
          fi
          # Current deploy topology publishes nginx through the bastion host.
          NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"
          NGINX_USER_RESOLVED="${BASTION_USER_RESOLVED}"
          test -n "${BASTION_HOST_RESOLVED}"
          test -n "${BASTION_USER_RESOLVED}"
          test -n "${NGINX_HOST_RESOLVED}"
          test -n "${NGINX_USER_RESOLVED}"
          printf '%s\n' \
            "Host bastion" \
            "  HostName ${BASTION_HOST_RESOLVED}" \
            "  User ${BASTION_USER_RESOLVED}" \
            "  IdentityFile ${HOME}/.ssh/id_rsa_matchID" \
            "  IdentitiesOnly yes" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            "Host * !bastion" \
            "  ProxyJump bastion" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            > "${HOME}/.ssh/config"
          {
            echo "BASTION_HOST_RESOLVED=${BASTION_HOST_RESOLVED}"
            echo "BASTION_USER_RESOLVED=${BASTION_USER_RESOLVED}"
            echo "NGINX_HOST_RESOLVED=${NGINX_HOST_RESOLVED}"
            echo "NGINX_USER_RESOLVED=${NGINX_USER_RESOLVED}"
          } >> "${GITHUB_ENV}"
          sed -n 'l' "${HOME}/.ssh/config"
          chmod 600 "${HOME}/.ssh/config"
        env:
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER || 'ubuntu' }}
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Debug dataprep bastion resolution
        run: |
          set -euo pipefail
          PROXY_ROUTE="$(ssh -G -F "${HOME}/.ssh/config" 10.0.0.1 | awk '
            $1 == "proxyjump" || $1 == "proxycommand" {
              $1 = ""
              sub(/^ /, "")
              print
              exit
            }
          ')"
          echo "proxy_route_present=$([ -n "${PROXY_ROUTE}" ] && echo yes || echo no)"
          if [ -z "${PROXY_ROUTE}" ]; then
            exit 1
          fi
      - name: Force dataprep year remote run markers
        run: make -C packages/deces-dataprep clean GIT_BRANCH=dev FILES_TO_PROCESS="${FILES_TO_PROCESS}" REPOSITORY_BUCKET="${REPOSITORY_BUCKET}"
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
