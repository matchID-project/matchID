name: CD

on:
  repository_dispatch:
    types: [data-update]
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect artifact changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dataprep_backend: ${{ steps.filter.outputs.dataprep_backend }}
      dataprep_frontend: ${{ steps.filter.outputs.dataprep_frontend }}
      deces_backend: ${{ steps.filter.outputs.deces_backend }}
      deces_ui: ${{ steps.filter.outputs.deces_ui }}
      dataprep_snapshot: ${{ steps.filter.outputs.dataprep_snapshot }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dataprep_backend:
              - 'Makefile'
              - 'packages/dataprep-backend/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            dataprep_frontend:
              - 'Makefile'
              - 'packages/dataprep-frontend/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            deces_backend:
              - 'Makefile'
              - 'packages/deces-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            deces_ui:
              - 'Makefile'
              - 'packages/deces-ui/**'
              - 'packages/deces-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            dataprep_snapshot:
              - 'Makefile'
              - 'packages/deces-dataprep/**'
              - 'packages/dataprep-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - 'scripts/**'
              - '.github/workflows/cd.yml'

  dataprep-backend:
    name: Publish matchid-backend image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || needs.changes.outputs.dataprep_backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Build matchid-backend image
        run: |
          make -C packages/deces-dataprep config GIT_BRANCH=${CD_GIT_BRANCH}
          make -C packages/dataprep-backend backend-build GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      - name: Publish matchid-backend image
        run: make -C packages/dataprep-backend backend-docker-push GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: Publish legacy matchID package on master
        if: github.ref == 'refs/heads/master'
        run: |
          make -C packages/deces-dataprep config frontend-config GIT_BRANCH=${GITHUB_REF_NAME}
          make -C packages/dataprep-backend package-publish GIT_BRANCH=${GITHUB_REF_NAME}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}

  dataprep-frontend:
    name: Publish matchid-frontend image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || needs.changes.outputs.dataprep_frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Build matchid-frontend image
        run: |
          make -C packages/deces-dataprep config frontend-config GIT_BRANCH=${CD_GIT_BRANCH}
          make -C packages/dataprep-frontend build GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          NPM_AUDIT_IGNORE: "true"
      - name: Publish matchid-frontend image
        run: make -C packages/dataprep-frontend frontend-docker-push GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  deces-backend:
    name: Publish deces-backend image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || needs.changes.outputs.deces_backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Build deces-backend image
        run: make -C packages/deces-backend DATA_DIR=build-data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      - name: Publish deces-backend image
        run: make -C packages/deces-backend docker-push-backend GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  deces-ui:
    name: Publish deces-ui image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || needs.changes.outputs.deces_ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Build deces-ui image
        run: make APP=deces-ui build GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      - name: Publish deces-ui image
        run: make frontend-docker-push GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  dataprep-snapshot:
    name: Publish dataprep snapshot
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || needs.changes.outputs.dataprep_snapshot == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      FILES_TO_PROCESS: deces-2020.txt.gz
      ES_COUNT_FILE: /tmp/dataprep-snapshot.count
      ES_SAMPLE_FILE: /tmp/dataprep-snapshot.sample.json
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Select snapshot repository bucket
        run: |
          if [ "${CD_GIT_BRANCH}" = "master" ]; then
            echo "REPOSITORY_BUCKET=fichier-des-personnes-decedees-elasticsearch" >> "${GITHUB_ENV}"
          else
            echo "REPOSITORY_BUCKET=fichier-des-personnes-decedees-elasticsearch-dev" >> "${GITHUB_ENV}"
          fi
      - name: Produce dataprep snapshot
        run: make artifact-produce-dataprep-snapshot GIT_BRANCH=${CD_GIT_BRANCH} FILES_TO_PROCESS=${FILES_TO_PROCESS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET}
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Export dataprep snapshot metadata
        run: |
          make -C packages/deces-infra elasticsearch-index-export ES_INDEX=deces ES_COUNT_FILE=${ES_COUNT_FILE} ES_SAMPLE_FILE=${ES_SAMPLE_FILE} ES_SAMPLE_SIZE=25 ES_SAMPLE_SEED=424242
          SNAPSHOT_NAME=$(make artifact-version-dataprep-snapshot FILES_TO_PROCESS=${FILES_TO_PROCESS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET} | tail -1)
          {
            echo "snapshot_name=${SNAPSHOT_NAME}"
            echo "repository_bucket=${REPOSITORY_BUCKET}"
            echo "files_to_process=${FILES_TO_PROCESS}"
            echo "count=$(cat ${ES_COUNT_FILE})"
          } | tee /tmp/dataprep-snapshot-metadata.txt
      - name: Publish dataprep snapshot
        run: make artifact-publish-dataprep-snapshot GIT_BRANCH=${CD_GIT_BRANCH} FILES_TO_PROCESS=${FILES_TO_PROCESS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET}
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Upload dataprep snapshot metadata
        uses: actions/upload-artifact@v4
        with:
          name: dataprep-snapshot-metadata
          path: |
            /tmp/dataprep-snapshot-metadata.txt
            /tmp/dataprep-snapshot.count
            /tmp/dataprep-snapshot.sample.json

  deploy:
    name: Deploy
    needs:
      - changes
      - dataprep-backend
      - dataprep-frontend
      - deces-backend
      - deces-ui
      - dataprep-snapshot
    if: >-
      ${{
        always() &&
        (
          github.ref == 'refs/heads/dev' ||
          github.ref == 'refs/heads/master' ||
          github.event.client_payload.ref == 'dev' ||
          github.event.client_payload.ref == 'master'
        ) &&
        !cancelled() &&
        !failure() &&
        (
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'repository_dispatch' ||
          needs.changes.outputs.dataprep_backend == 'true' ||
          needs.changes.outputs.dataprep_frontend == 'true' ||
          needs.changes.outputs.deces_backend == 'true' ||
          needs.changes.outputs.deces_ui == 'true' ||
          needs.changes.outputs.dataprep_snapshot == 'true'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      APP_DNS: deces.matchid.io
      GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Install deploy SSH key
        run: |
          test -n "${SSH_PRIVATE_KEY}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa_matchID"
          chmod 600 "${HOME}/.ssh/id_rsa_matchID"
          ssh-keygen -y -f "${HOME}/.ssh/id_rsa_matchID" > "${HOME}/.ssh/id_rsa_matchID.pub"
          chmod 644 "${HOME}/.ssh/id_rsa_matchID.pub"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy deces.matchid.io
        run: |
          if [[ ( "$GIT_BRANCH" == "dev" ) ]]; then
            make deploy-remote-preflight \
              GIT_BRANCH=$GIT_BRANCH \
              APP_DNS=$APP_DNS \
              FILES_TO_PROCESS=$FILES_TO_PROCESS_DEV \
              REPOSITORY_BUCKET=$REPOSITORY_BUCKET_DEV
            make deploy-remote \
              GIT_BRANCH=$GIT_BRANCH \
              APP_DNS=$APP_DNS \
              FILES_TO_PROCESS=$FILES_TO_PROCESS_DEV REPOSITORY_BUCKET=$REPOSITORY_BUCKET_DEV \
              NGINX_USER=$NGINX_USER NGINX_HOST=$NGINX_HOST \
              SMTP_TLS_SELFSIGNED=$SMTP_TLS_SELFSIGNED SMTP_HOST=$SMTP_HOST SMTP_PORT=$SMTP_PORT SMTP_USER=$SMTP_USER SMTP_PWD=$SMTP_PWD \
              remote_http_proxy=$remote_http_proxy remote_https_proxy=$remote_https_proxy remote_no_proxy=$remote_no_proxy \
              GOOGLE_ANALYTICS_ID=$GOOGLE_ANALYTICS_ID GOOGLE_ADSENSE_ID=$GOOGLE_ADSENSE_ID \
              LOG_BAN_IP=$LOG_BAN_IP \
              MMDB_TOKEN=$MMDB_TOKEN \
              NEW_RELIC_API_KEY=$NEW_RELIC_API_KEY NEW_RELIC_ACCOUNT_ID=$NEW_RELIC_ACCOUNT_ID NEW_RELIC_INGEST_KEY=$NEW_RELIC_INGEST_KEY
          fi
          if [[ ( "$GIT_BRANCH" == "master" ) ]]; then
            make deploy-remote \
              GIT_BACKEND_BRANCH=master GIT_BRANCH=$GIT_BRANCH \
              BACKEND_JOB_CONCURRENCY=$BACKEND_JOB_CONCURRENCY_MASTER \
              BACKEND_CHUNK_CONCURRENCY=$BACKEND_CHUNK_CONCURRENCY_MASTER \
              ES_MEM=$ES_MEM_MASTER \
              SCW_FLAVOR=$SCW_FLAVOR_MASTER SCW_VOLUME_SIZE=$SCW_VOLUME_SIZE_MASTER SCW_VOLUME_TYPE=$SCW_VOLUME_TYPE_MASTER \
              NGINX_USER=$NGINX_USER NGINX_HOST=$NGINX_HOST \
              SMTP_TLS_SELFSIGNED=$SMTP_TLS_SELFSIGNED SMTP_HOST=$SMTP_HOST SMTP_PORT=$SMTP_PORT SMTP_USER=$SMTP_USER SMTP_PWD=$SMTP_PWD \
              remote_http_proxy=$remote_http_proxy remote_https_proxy=$remote_https_proxy remote_no_proxy=$remote_no_proxy \
              GOOGLE_ANALYTICS_ID=$GOOGLE_ANALYTICS_ID GOOGLE_ADSENSE_ID=$GOOGLE_ADSENSE_ID \
              LOG_BAN_IP=$LOG_BAN_IP \
              MMDB_TOKEN=$MMDB_TOKEN \
              NEW_RELIC_API_KEY=$NEW_RELIC_API_KEY NEW_RELIC_ACCOUNT_ID=$NEW_RELIC_ACCOUNT_ID NEW_RELIC_INGEST_KEY=$NEW_RELIC_INGEST_KEY
          fi
        env:
          FILES_TO_PROCESS_DEV: deces-2020-m[0-1][0-9].txt.gz
          REPOSITORY_BUCKET_DEV: fichier-des-personnes-decedees-elasticsearch-dev
          BACKEND_JOB_CONCURRENCY_MASTER: 6
          BACKEND_CHUNK_CONCURRENCY_MASTER: 3
          ES_MEM_MASTER: 8192m
          SCW_FLAVOR_MASTER: GP1-XS
          SCW_VOLUME_SIZE_MASTER: 60000000000
          SCW_VOLUME_TYPE_MASTER: l_ssd
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          GOOGLE_ADSENSE_ID: ${{ secrets.GOOGLE_ADSENSE_ID }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          TOOLS_STORAGE_ACCESS_KEY: ${{ secrets.TOOLS_STORAGE_ACCESS_KEY }}
          TOOLS_STORAGE_SECRET_KEY: ${{ secrets.TOOLS_STORAGE_SECRET_KEY }}
          LOG_BUCKET: ${{ secrets.LOG_BUCKET }}
          LOG_DB_BUCKET: ${{ secrets.LOG_DB_BUCKET }}
          STATS_BUCKET: ${{ secrets.STATS_BUCKET }}
          PROOFS_BUCKET: ${{ secrets.PROOFS_BUCKET }}
          SCW_SECRET_TOKEN: ${{ secrets.SCW_SECRET_TOKEN }}
          SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_IMAGE_ID: ${{ secrets.SCW_IMAGE_ID }}
          SCW_SERVER_OPTS: ${{ secrets.SCW_SERVER_OPTS }}
          SCW_PRIVATE_NETWORK_ID: ${{ secrets.SCW_PRIVATE_NETWORK_ID }}
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER }}
          CDN_TOKEN: ${{ secrets.CDN_TOKEN }}
          CDN_ZONE_ID: ${{ secrets.CDN_ZONE_ID }}
          BLOCK_DEPLOY: ${{ secrets.BLOCK_DEPLOY }}
          BACKEND_TOKEN_KEY: ${{ secrets.BACKEND_TOKEN_KEY }}
          BACKEND_TOKEN_PASSWORD: ${{ secrets.BACKEND_TOKEN_PASSWORD }}
          SMTP_TLS_SELFSIGNED: ${{ secrets.SMTP_TLS_SELFSIGNED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PWD: ${{ secrets.SMTP_PWD }}
          LOG_BAN_IP: ${{ secrets.LOG_BAN_IP }}
          MMDB_TOKEN: ${{ secrets.MMDB_TOKEN }}
          remote_http_proxy: ${{ secrets.remote_http_proxy }}
          remote_https_proxy: ${{ secrets.remote_https_proxy }}
          remote_no_proxy: localhost
          NEW_RELIC_INGEST_KEY: ${{ secrets.NEW_RELIC_INGEST_KEY }}
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          MONITOR_BUCKET: ${{ secrets.MONITOR_BUCKET }}
