name: CD

on:
  repository_dispatch:
    types: [data-update]
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dataprep_scope:
        description: Dataprep CD scope to run
        required: false
        default: small
        type: choice
        options:
          - none
          - all
          - small
          - year
      deploy_target:
        description: Deploy target to run
        required: false
        default: none
        type: choice
        options:
          - none
          - dev

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect artifact changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact_matchid_backend: ${{ steps.detect.outputs.artifact_matchid_backend }}
      artifact_matchid_frontend: ${{ steps.detect.outputs.artifact_matchid_frontend }}
      artifact_deces_backend: ${{ steps.detect.outputs.artifact_deces_backend }}
      artifact_deces_ui: ${{ steps.detect.outputs.artifact_deces_ui }}
      artifact_dataprep_snapshot: ${{ steps.detect.outputs.artifact_dataprep_snapshot }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
          fetch-depth: 0
      - name: Resolve artifact flags
        id: detect
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ -n "${EVENT_BEFORE}" ]; then
            git diff --name-only "${EVENT_BEFORE}" "${GITHUB_SHA}" | LC_ALL=C sort -u > /tmp/changed-files.txt
          else
            : > /tmp/changed-files.txt
          fi
          touch /tmp/changed-files.txt

          prefixed_version_files() {
            local dir="$1"
            make -s -C "${dir}" version-files | sed "s#^#${dir}/#" | LC_ALL=C sort -u
          }

          emit_flag() {
            echo "$1=$2" >> "${GITHUB_OUTPUT}"
          }

          resolve_artifact_flag() {
            local name="$1"
            local dir="$2"
            local files="/tmp/${name}.files"
            prefixed_version_files "${dir}" > "${files}"
            if grep -Fxf "${files}" /tmp/changed-files.txt > /dev/null 2>&1; then
              emit_flag "${name}" true
            else
              emit_flag "${name}" false
            fi
          }

          resolve_artifact_flag artifact_matchid_backend packages/dataprep-backend
          resolve_artifact_flag artifact_matchid_frontend packages/dataprep-frontend
          resolve_artifact_flag artifact_deces_backend packages/deces-backend
          resolve_artifact_flag artifact_deces_ui packages/deces-ui
          resolve_artifact_flag artifact_dataprep_snapshot packages/deces-dataprep
        env:
          EVENT_BEFORE: ${{ github.event.before }}

  ensure-matchid-backend-image:
    name: ensure-matchid-backend-image
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Resolve matchid-backend execution
        id: resolve
        run: |
          SHOULD_PUBLISH=false
          REASON=unchanged
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${INPUT_DATAPREP_SCOPE}" = "all" ]; then
            SHOULD_PUBLISH=true
            REASON=explicit_all_dispatch
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${ARTIFACT_CHANGED}" = "true" ]; then
            SHOULD_PUBLISH=true
            REASON=artifact_changed
          fi
          {
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "reason=${REASON}"
          } >> "${GITHUB_OUTPUT}"
        env:
          INPUT_DATAPREP_SCOPE: ${{ inputs.dataprep_scope || 'none' }}
          ARTIFACT_CHANGED: ${{ needs.changes.outputs.artifact_matchid_backend }}
      - name: Build matchid-backend image
        if: steps.resolve.outputs.should_publish == 'true'
        run: |
          make -C packages/deces-dataprep config GIT_BRANCH=dev
          make -C packages/dataprep-backend backend-build GIT_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      - name: Publish matchid-backend image
        if: steps.resolve.outputs.should_publish == 'true'
        run: make -C packages/dataprep-backend backend-docker-push GIT_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: No-op matchid-backend image
        if: steps.resolve.outputs.should_publish != 'true'
        run: echo "No publish needed for matchid-backend (${{
          steps.resolve.outputs.reason }})"

  ensure-matchid-frontend-image:
    name: ensure-matchid-frontend-image
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Resolve matchid-frontend execution
        id: resolve
        run: |
          SHOULD_PUBLISH=false
          REASON=unchanged
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${INPUT_DATAPREP_SCOPE}" = "all" ]; then
            SHOULD_PUBLISH=true
            REASON=explicit_all_dispatch
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${ARTIFACT_CHANGED}" = "true" ]; then
            SHOULD_PUBLISH=true
            REASON=artifact_changed
          fi
          {
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "reason=${REASON}"
          } >> "${GITHUB_OUTPUT}"
        env:
          INPUT_DATAPREP_SCOPE: ${{ inputs.dataprep_scope || 'none' }}
          ARTIFACT_CHANGED: ${{ needs.changes.outputs.artifact_matchid_frontend }}
      - name: Build matchid-frontend image
        if: steps.resolve.outputs.should_publish == 'true'
        run: |
          make -C packages/deces-dataprep config frontend-config GIT_BRANCH=dev
          make -C packages/dataprep-frontend build GIT_BRANCH=dev GIT_BACKEND_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          NPM_AUDIT_IGNORE: "true"
      - name: Publish matchid-frontend image
        if: steps.resolve.outputs.should_publish == 'true'
        run: make -C packages/dataprep-frontend frontend-docker-push GIT_BRANCH=dev GIT_BACKEND_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: No-op matchid-frontend image
        if: steps.resolve.outputs.should_publish != 'true'
        run: echo "No publish needed for matchid-frontend (${{
          steps.resolve.outputs.reason }})"

  ensure-deces-backend-image:
    name: ensure-deces-backend-image
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Resolve deces-backend execution
        id: resolve
        run: |
          SHOULD_PUBLISH=false
          REASON=unchanged
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${INPUT_DATAPREP_SCOPE}" = "all" ]; then
            SHOULD_PUBLISH=true
            REASON=explicit_all_dispatch
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${ARTIFACT_CHANGED}" = "true" ]; then
            SHOULD_PUBLISH=true
            REASON=artifact_changed
          fi
          {
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "reason=${REASON}"
          } >> "${GITHUB_OUTPUT}"
        env:
          INPUT_DATAPREP_SCOPE: ${{ inputs.dataprep_scope || 'none' }}
          ARTIFACT_CHANGED: ${{ needs.changes.outputs.artifact_deces_backend }}
      - name: Build deces-backend image
        if: steps.resolve.outputs.should_publish == 'true'
        run: make -C packages/deces-backend DATA_DIR=data NPM_AUDIT_DRY_RUN=true backend-build-image GIT_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      - name: Publish deces-backend image
        if: steps.resolve.outputs.should_publish == 'true'
        run: make -C packages/deces-backend docker-push-backend GIT_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: No-op deces-backend image
        if: steps.resolve.outputs.should_publish != 'true'
        run: echo "No publish needed for deces-backend (${{
          steps.resolve.outputs.reason }})"

  ensure-deces-ui-image:
    name: ensure-deces-ui-image
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Resolve deces-ui execution
        id: resolve
        run: |
          SHOULD_PUBLISH=false
          REASON=unchanged
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${INPUT_DATAPREP_SCOPE}" = "all" ]; then
            SHOULD_PUBLISH=true
            REASON=explicit_all_dispatch
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${ARTIFACT_CHANGED}" = "true" ]; then
            SHOULD_PUBLISH=true
            REASON=artifact_changed
          fi
          {
            echo "should_publish=${SHOULD_PUBLISH}"
            echo "reason=${REASON}"
          } >> "${GITHUB_OUTPUT}"
        env:
          INPUT_DATAPREP_SCOPE: ${{ inputs.dataprep_scope || 'none' }}
          ARTIFACT_CHANGED: ${{ needs.changes.outputs.artifact_deces_ui }}
      - name: Build deces-ui image
        if: steps.resolve.outputs.should_publish == 'true'
        run: make APP=deces-ui build GIT_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      - name: Publish deces-ui image
        if: steps.resolve.outputs.should_publish == 'true'
        run: make frontend-docker-push GIT_BRANCH=dev
        env:
          CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: No-op deces-ui image
        if: steps.resolve.outputs.should_publish != 'true'
        run: echo "No publish needed for deces-ui (${{
          steps.resolve.outputs.reason }})"

  ensure-dataprep-small-snapshot:
    name: ensure-dataprep-small-snapshot (${{ matrix.dataset.name }})
    needs:
      - changes
      - ensure-matchid-backend-image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dataset:
          - name: deces-2020-m01
            files_to_process: deces-2020-m01.txt.gz
          - name: deaths
            files_to_process: deaths.txt.gz
    env:
      CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      FILES_TO_PROCESS: ${{ matrix.dataset.files_to_process }}
      REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
      CHUNK_SIZE: 5000
      ES_THREADS: 2
      RECIPE_THREADS: 2
      ES_MEM: 4000m
      ES_COUNT_FILE: /tmp/dataprep-small-${{ matrix.dataset.name }}-snapshot.count
      ES_SAMPLE_FILE: /tmp/dataprep-small-${{ matrix.dataset.name }}-snapshot.sample.json
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Resolve dataprep small execution
        id: resolve
        run: |
          SHOULD_RUN=false
          REASON=unchanged
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ] && [ "${DISPATCH_REF}" = "main" ]; then
            SHOULD_RUN=true
            REASON=repository_dispatch_main
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && { [ "${INPUT_DATAPREP_SCOPE}" = "all" ] || [ "${INPUT_DATAPREP_SCOPE}" = "small" ]; }; then
            SHOULD_RUN=true
            REASON=explicit_small_dispatch
          elif [ "${GITHUB_REF}" = "refs/heads/main" ] && [ "${ARTIFACT_CHANGED}" = "true" ]; then
            SHOULD_RUN=true
            REASON=artifact_changed
          fi
          {
            echo "should_run=${SHOULD_RUN}"
            echo "reason=${REASON}"
          } >> "${GITHUB_OUTPUT}"
        env:
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          INPUT_DATAPREP_SCOPE: ${{ inputs.dataprep_scope || 'none' }}
          ARTIFACT_CHANGED: ${{ needs.changes.outputs.artifact_dataprep_snapshot == 'true' || needs.changes.outputs.artifact_matchid_backend == 'true' }}
      - name: Produce dataprep small snapshot
        if: steps.resolve.outputs.should_run == 'true'
        run: make artifact-produce-dataprep-snapshot GIT_BRANCH=dev FILES_TO_PROCESS="${FILES_TO_PROCESS}" REPOSITORY_BUCKET="${REPOSITORY_BUCKET}" CHUNK_SIZE="${CHUNK_SIZE}" ES_THREADS="${ES_THREADS}" RECIPE_THREADS="${RECIPE_THREADS}" ES_MEM="${ES_MEM}"
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Export dataprep small snapshot metadata
        if: steps.resolve.outputs.should_run == 'true'
        run: |
          make -C packages/deces-infra elasticsearch-index-export ES_INDEX=deces ES_COUNT_FILE=${ES_COUNT_FILE} ES_SAMPLE_FILE=${ES_SAMPLE_FILE} ES_SAMPLE_SIZE=25 ES_SAMPLE_SEED=424242
          SNAPSHOT_NAME=$(make artifact-version-dataprep-snapshot FILES_TO_PROCESS="${FILES_TO_PROCESS}" REPOSITORY_BUCKET="${REPOSITORY_BUCKET}" | tail -1)
          {
            echo "snapshot_name=${SNAPSHOT_NAME}"
            echo "repository_bucket=${REPOSITORY_BUCKET}"
            echo "files_to_process=${FILES_TO_PROCESS}"
            echo "count=$(cat ${ES_COUNT_FILE})"
          } | tee /tmp/dataprep-small-${{ matrix.dataset.name }}-snapshot-metadata.txt
      - name: Publish dataprep small snapshot
        if: steps.resolve.outputs.should_run == 'true'
        run: make artifact-publish-dataprep-snapshot GIT_BRANCH=dev FILES_TO_PROCESS="${FILES_TO_PROCESS}" REPOSITORY_BUCKET="${REPOSITORY_BUCKET}"
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Upload dataprep small snapshot metadata
        if: steps.resolve.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dataprep-small-${{ matrix.dataset.name }}-snapshot-metadata
          path: |
            /tmp/dataprep-small-${{ matrix.dataset.name }}-snapshot-metadata.txt
            /tmp/dataprep-small-${{ matrix.dataset.name }}-snapshot.count
            /tmp/dataprep-small-${{ matrix.dataset.name }}-snapshot.sample.json
      - name: No-op dataprep small snapshot
        if: steps.resolve.outputs.should_run != 'true'
        run: echo "No dataprep small snapshot run needed (${{
          steps.resolve.outputs.reason }})"

  ensure-dataprep-year-snapshot:
    name: ensure-dataprep-year-snapshot
    needs:
      - changes
      - ensure-matchid-backend-image
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      CD_GIT_BRANCH: ${{ github.event.client_payload.ref || github.ref_name }}
      FILES_TO_PROCESS: deces-2020-m[0-1][0-9].txt.gz
      REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
      CHUNK_SIZE: 75000
      ES_THREADS: 14
      RECIPE_THREADS: 16
      RECIPE_QUEUE: 18
      ES_MEM: 30000m
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Resolve dataprep year execution context
        id: year_context
        run: |
          set -euo pipefail
          SHOULD_RUN=true
          REASON=push_or_repository_dispatch
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${INPUT_DATAPREP_SCOPE}" = "all" ] || [ "${INPUT_DATAPREP_SCOPE}" = "year" ]; then
              REASON=explicit_year_dispatch
            elif [ "${INPUT_DEPLOY_TARGET}" = "dev" ]; then
              rm -f packages/deces-dataprep/repository-check
              make -C packages/deces-dataprep repository-check GIT_BRANCH=dev FILES_TO_PROCESS="${FILES_TO_PROCESS}" REPOSITORY_BUCKET="${REPOSITORY_BUCKET}"
              if test -s packages/deces-dataprep/repository-check; then
                SHOULD_RUN=false
                REASON=year_snapshot_present
              else
                REASON=year_snapshot_missing
              fi
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${ARTIFACT_CHANGED}" != "true" ]; then
            SHOULD_RUN=false
            REASON=unchanged
          elif [ "${GITHUB_EVENT_NAME}" != "push" ] && [ "${GITHUB_EVENT_NAME}" != "repository_dispatch" ]; then
            SHOULD_RUN=false
            REASON=not_requested
          fi
          {
            echo "should_run=${SHOULD_RUN}"
            echo "reason=${REASON}"
          } >> "${GITHUB_OUTPUT}"
        env:
          INPUT_DATAPREP_SCOPE: ${{ inputs.dataprep_scope || 'none' }}
          INPUT_DEPLOY_TARGET: ${{ inputs.deploy_target || 'none' }}
          ARTIFACT_CHANGED: ${{ needs.changes.outputs.artifact_dataprep_snapshot == 'true' || needs.changes.outputs.artifact_matchid_backend == 'true' }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Install dataprep deploy SSH key
        if: steps.year_context.outputs.should_run == 'true'
        run: |
          test -n "${SSH_PRIVATE_KEY}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa_matchID"
          chmod 600 "${HOME}/.ssh/id_rsa_matchID"
          ssh-keygen -y -f "${HOME}/.ssh/id_rsa_matchID" > "${HOME}/.ssh/id_rsa_matchID.pub"
          chmod 644 "${HOME}/.ssh/id_rsa_matchID.pub"
          export SSH_AUTH_SOCK=/tmp/ssh_agent.sock
          ssh-agent -a "${SSH_AUTH_SOCK}" > /dev/null
          ssh-add "${HOME}/.ssh/id_rsa_matchID"
          sanitize_host() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#http://}"
            value="${value#https://}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value##*@}"; fi
            value="${value%%/*}"
            if [[ "${value}" =~ ^\[[^]]+\]:[0-9]+$ ]]; then
              value="${value#\[}"
              value="${value%%\]:*}"
            elif [[ "${value}" =~ ^[^:]+:[0-9]+$ ]]; then
              value="${value%%:*}"
            fi
            printf '%s' "${value}"
          }
          sanitize_user() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value%%@*}"; fi
            printf '%s' "${value}"
          }
          BASTION_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          BASTION_USER_RESOLVED=ubuntu
          NGINX_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          NGINX_USER_RESOLVED="$(sanitize_user "${NGINX_USER}")"
          BASTION_SOURCE=nginx
          if [ -z "${BASTION_HOST_RESOLVED}" ]; then BASTION_HOST_RESOLVED="$(sanitize_host "${BASTION_HOST}")"; fi
          if [ -z "${BASTION_USER_RESOLVED}" ]; then BASTION_USER_RESOLVED="$(sanitize_user "${BASTION_USER}")"; fi
          if [ -z "${NGINX_HOST_RESOLVED}" ]; then NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"; fi
          if [ -z "${NGINX_USER_RESOLVED}" ]; then NGINX_USER_RESOLVED=ubuntu; fi
          if [ -z "$(sanitize_host "${NGINX_HOST}")" ]; then BASTION_SOURCE=bastion; fi
          echo "bastion_source=${BASTION_SOURCE}"
          if printf '%s' "${BASTION_HOST_RESOLVED}" | grep -Eq '^[0-9.]+$'; then
            echo "bastion_input_host_kind=ip"
          else
            echo "bastion_input_host_kind=name"
          fi
          if getent hosts "${BASTION_HOST_RESOLVED}" >/dev/null 2>&1; then
            echo "bastion_input_host_resolves=yes"
          else
            echo "bastion_input_host_resolves=no"
            # Temporary fallback while monorepo runner secrets still expose a non-resolving bastion host.
            BASTION_HOST_RESOLVED=163.172.185.238
            BASTION_SOURCE=fallback_ip
            echo "bastion_source=${BASTION_SOURCE}"
            echo "bastion_input_host_kind=ip"
          fi
          # Current deploy topology publishes nginx through the bastion host.
          NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"
          NGINX_USER_RESOLVED="${BASTION_USER_RESOLVED}"
          test -n "${BASTION_HOST_RESOLVED}"
          test -n "${BASTION_USER_RESOLVED}"
          test -n "${NGINX_HOST_RESOLVED}"
          test -n "${NGINX_USER_RESOLVED}"
          printf '%s\n' \
            "Host bastion" \
            "  HostName ${BASTION_HOST_RESOLVED}" \
            "  User ${BASTION_USER_RESOLVED}" \
            "  IdentityFile ${HOME}/.ssh/id_rsa_matchID" \
            "  IdentitiesOnly yes" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            "Host * !bastion" \
            "  ProxyJump bastion" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            > "${HOME}/.ssh/config"
          {
            echo "BASTION_HOST_RESOLVED=${BASTION_HOST_RESOLVED}"
            echo "BASTION_USER_RESOLVED=${BASTION_USER_RESOLVED}"
            echo "NGINX_HOST_RESOLVED=${NGINX_HOST_RESOLVED}"
            echo "NGINX_USER_RESOLVED=${NGINX_USER_RESOLVED}"
          } >> "${GITHUB_ENV}"
          sed -n 'l' "${HOME}/.ssh/config"
          chmod 600 "${HOME}/.ssh/config"
        env:
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER || 'ubuntu' }}
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Debug dataprep bastion resolution
        if: steps.year_context.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          PROXY_ROUTE="$(ssh -G -F "${HOME}/.ssh/config" 10.0.0.1 | awk '
            $1 == "proxyjump" || $1 == "proxycommand" {
              $1 = ""
              sub(/^ /, "")
              print
              exit
            }
          ')"
          echo "proxy_route_present=$([ -n "${PROXY_ROUTE}" ] && echo yes || echo no)"
          if [ -z "${PROXY_ROUTE}" ]; then
            exit 1
          fi
      - name: Check dataprep year snapshot
        if: steps.year_context.outputs.should_run == 'true'
        run: make -C packages/deces-dataprep clean full-check GIT_BRANCH=dev FILES_TO_PROCESS="${FILES_TO_PROCESS}" REPOSITORY_BUCKET="${REPOSITORY_BUCKET}"
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Run dataprep year remote-all
        if: steps.year_context.outputs.should_run == 'true'
        run: |
          make -C packages/deces-dataprep remote-all \
            GIT_BRANCH=dev \
            FILES_TO_PROCESS="${FILES_TO_PROCESS}" \
            REPOSITORY_BUCKET="${REPOSITORY_BUCKET}" \
            SCW_FLAVOR="${SCW_FLAVOR}" SCW_VOLUME_SIZE="${SCW_VOLUME_SIZE}" SCW_VOLUME_TYPE="${SCW_VOLUME_TYPE}" \
            CHUNK_SIZE="${CHUNK_SIZE}" ES_THREADS="${ES_THREADS}" RECIPE_THREADS="${RECIPE_THREADS}" ES_MEM="${ES_MEM}" RECIPE_QUEUE="${RECIPE_QUEUE}" \
            REMOTE_TOOLS_REPOSITORY=matchID REMOTE_TOOLS_BRANCH="${CD_GIT_BRANCH}" REMOTE_TOOLS_PATH=matchID/matchID REMOTE_TOOLS_MAKE_PATH=matchID/matchID/packages/tools \
            REMOTE_APP_REPOSITORY=matchID REMOTE_APP_BRANCH="${CD_GIT_BRANCH}" REMOTE_APP_PATH=matchID/matchID REMOTE_APP_MAKE_PATH=matchID/matchID/packages/deces-dataprep \
            SSHKEY_PRIVATE="${HOME}/.ssh/id_rsa_matchID" \
            CLOUD_SSHOPTS="-J${BASTION_USER_RESOLVED}@${BASTION_HOST_RESOLVED}"
        env:
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          SCW_FLAVOR: PRO2-M
          SCW_VOLUME_SIZE: 50000000000
          SCW_VOLUME_TYPE: sbs_volume
          remote_http_proxy: ${{ secrets.remote_http_proxy }}
          remote_https_proxy: ${{ secrets.remote_https_proxy }}
          remote_no_proxy: localhost
          SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_SECRET_TOKEN: ${{ secrets.SCW_SECRET_TOKEN }}
          SCW_SERVER_OPTS: ${{ secrets.SCW_SERVER_OPTS }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
      - name: Export dataprep year snapshot metadata
        if: steps.year_context.outputs.should_run == 'true'
        run: |
          SNAPSHOT_NAME=$(make artifact-version-dataprep-snapshot FILES_TO_PROCESS="${FILES_TO_PROCESS}" REPOSITORY_BUCKET="${REPOSITORY_BUCKET}" | tail -1)
          {
            echo "snapshot_name=${SNAPSHOT_NAME}"
            echo "repository_bucket=${REPOSITORY_BUCKET}"
            echo "files_to_process=${FILES_TO_PROCESS}"
            echo "runner=remote-all"
          } | tee /tmp/dataprep-year-snapshot-metadata.txt
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Upload dataprep year snapshot metadata
        if: steps.year_context.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dataprep-year-snapshot-metadata
          path: |
            /tmp/dataprep-year-snapshot-metadata.txt
      - name: No-op dataprep year snapshot
        if: steps.year_context.outputs.should_run != 'true'
        run: echo "No dataprep year snapshot run needed (${{
          steps.year_context.outputs.reason }})"

  deploy-dev:
    name: deploy-dev
    needs:
      - changes
      - ensure-deces-backend-image
      - ensure-deces-ui-image
      - ensure-dataprep-year-snapshot
    if: >-
      ${{
        always() &&
        !cancelled() &&
        !failure() &&
        (
          (
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main' &&
            (
              needs.changes.outputs.artifact_deces_backend == 'true' ||
              needs.changes.outputs.artifact_deces_ui == 'true' ||
              needs.changes.outputs.artifact_dataprep_snapshot == 'true' ||
              needs.changes.outputs.artifact_matchid_backend == 'true'
            )
          ) ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.ref == 'refs/heads/main' &&
            inputs.deploy_target == 'dev'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      APP_DNS: deces.matchid.io
      GIT_BRANCH: dev
      DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'none' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
      - name: Install deploy SSH key
        run: |
          test -n "${SSH_PRIVATE_KEY}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa_matchID"
          chmod 600 "${HOME}/.ssh/id_rsa_matchID"
          ssh-keygen -y -f "${HOME}/.ssh/id_rsa_matchID" > "${HOME}/.ssh/id_rsa_matchID.pub"
          chmod 644 "${HOME}/.ssh/id_rsa_matchID.pub"
          export SSH_AUTH_SOCK=/tmp/ssh_agent.sock
          ssh-agent -a "${SSH_AUTH_SOCK}" > /dev/null
          ssh-add "${HOME}/.ssh/id_rsa_matchID"
          sanitize_host() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#http://}"
            value="${value#https://}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value##*@}"; fi
            value="${value%%/*}"
            if [[ "${value}" =~ ^\[[^]]+\]:[0-9]+$ ]]; then
              value="${value#\[}"
              value="${value%%\]:*}"
            elif [[ "${value}" =~ ^[^:]+:[0-9]+$ ]]; then
              value="${value%%:*}"
            fi
            printf '%s' "${value}"
          }
          sanitize_user() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value%%@*}"; fi
            printf '%s' "${value}"
          }
          BASTION_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          BASTION_USER_RESOLVED=ubuntu
          NGINX_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          NGINX_USER_RESOLVED="$(sanitize_user "${NGINX_USER}")"
          if [ -z "${BASTION_HOST_RESOLVED}" ]; then BASTION_HOST_RESOLVED="$(sanitize_host "${BASTION_HOST}")"; fi
          if [ -z "${BASTION_USER_RESOLVED}" ]; then BASTION_USER_RESOLVED="$(sanitize_user "${BASTION_USER}")"; fi
          if [ -z "${NGINX_HOST_RESOLVED}" ]; then NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"; fi
          if [ -z "${NGINX_USER_RESOLVED}" ]; then NGINX_USER_RESOLVED=ubuntu; fi
          if ! getent hosts "${BASTION_HOST_RESOLVED}" >/dev/null 2>&1; then
            # Temporary fallback while monorepo runner secrets still expose a non-resolving bastion host.
            BASTION_HOST_RESOLVED=163.172.185.238
          fi
          # Current deploy topology publishes nginx through the bastion host.
          NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"
          NGINX_USER_RESOLVED="${BASTION_USER_RESOLVED}"
          test -n "${BASTION_HOST_RESOLVED}"
          test -n "${BASTION_USER_RESOLVED}"
          test -n "${NGINX_HOST_RESOLVED}"
          test -n "${NGINX_USER_RESOLVED}"
          printf '%s\n' \
            "Host bastion" \
            "  HostName ${BASTION_HOST_RESOLVED}" \
            "  User ${BASTION_USER_RESOLVED}" \
            "  IdentityFile ${HOME}/.ssh/id_rsa_matchID" \
            "  IdentitiesOnly yes" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            "Host * !bastion" \
            "  ProxyJump bastion" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            > "${HOME}/.ssh/config"
          {
            echo "BASTION_HOST_RESOLVED=${BASTION_HOST_RESOLVED}"
            echo "BASTION_USER_RESOLVED=${BASTION_USER_RESOLVED}"
            echo "NGINX_HOST_RESOLVED=${NGINX_HOST_RESOLVED}"
            echo "NGINX_USER_RESOLVED=${NGINX_USER_RESOLVED}"
          } >> "${GITHUB_ENV}"
          chmod 600 "${HOME}/.ssh/config"
        env:
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER || 'ubuntu' }}
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy dev-deces.matchid.io
        run: |
          make deploy-remote-preflight \
            GIT_BRANCH=$GIT_BRANCH \
            REMOTE_DEPLOY_BRANCH=main \
            DEPLOY_TARGET=dev \
            APP_DNS=$APP_DNS \
            FILES_TO_PROCESS=$FILES_TO_PROCESS_DEV \
            REPOSITORY_BUCKET=$REPOSITORY_BUCKET_DEV \
            SSHKEY_PRIVATE="${HOME}/.ssh/id_rsa_matchID" \
            CLOUD_SSHOPTS="-J${BASTION_USER_RESOLVED}@${BASTION_HOST_RESOLVED}"
          make deploy-remote \
            GIT_BRANCH=$GIT_BRANCH \
            REMOTE_DEPLOY_BRANCH=main \
            DEPLOY_TARGET=dev \
            APP_DNS=$APP_DNS \
            FILES_TO_PROCESS=$FILES_TO_PROCESS_DEV REPOSITORY_BUCKET=$REPOSITORY_BUCKET_DEV \
            NGINX_USER=$NGINX_USER_RESOLVED NGINX_HOST=$NGINX_HOST_RESOLVED \
            SMTP_TLS_SELFSIGNED="${SMTP_TLS_SELFSIGNED}" SMTP_HOST="${SMTP_HOST}" SMTP_PORT="${SMTP_PORT}" SMTP_USER="${SMTP_USER}" SMTP_PWD="${SMTP_PWD}" \
            remote_http_proxy=$remote_http_proxy remote_https_proxy=$remote_https_proxy remote_no_proxy=$remote_no_proxy \
            GOOGLE_ANALYTICS_ID=$GOOGLE_ANALYTICS_ID GOOGLE_ADSENSE_ID=$GOOGLE_ADSENSE_ID \
            LOG_BAN_IP=$LOG_BAN_IP \
            MMDB_TOKEN=$MMDB_TOKEN \
            NEW_RELIC_API_KEY=$NEW_RELIC_API_KEY NEW_RELIC_ACCOUNT_ID=$NEW_RELIC_ACCOUNT_ID NEW_RELIC_INGEST_KEY=$NEW_RELIC_INGEST_KEY \
            SSHKEY_PRIVATE="${HOME}/.ssh/id_rsa_matchID" \
            CLOUD_SSHOPTS="-J${BASTION_USER_RESOLVED}@${BASTION_HOST_RESOLVED}"
        env:
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          FILES_TO_PROCESS_DEV: deces-2020-m[0-1][0-9].txt.gz
          REPOSITORY_BUCKET_DEV: fichier-des-personnes-decedees-elasticsearch-dev
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          GOOGLE_ADSENSE_ID: ${{ secrets.GOOGLE_ADSENSE_ID }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          TOOLS_STORAGE_ACCESS_KEY: ${{ secrets.TOOLS_STORAGE_ACCESS_KEY }}
          TOOLS_STORAGE_SECRET_KEY: ${{ secrets.TOOLS_STORAGE_SECRET_KEY }}
          LOG_BUCKET: ${{ secrets.LOG_BUCKET }}
          LOG_DB_BUCKET: ${{ secrets.LOG_DB_BUCKET }}
          STATS_BUCKET: ${{ secrets.STATS_BUCKET }}
          PROOFS_BUCKET: ${{ secrets.PROOFS_BUCKET }}
          SCW_SECRET_TOKEN: ${{ secrets.SCW_SECRET_TOKEN }}
          SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_IMAGE_ID: ${{ secrets.SCW_IMAGE_ID }}
          SCW_SERVER_OPTS: ${{ secrets.SCW_SERVER_OPTS }}
          SCW_PRIVATE_NETWORK_ID: ${{ secrets.SCW_PRIVATE_NETWORK_ID }}
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER }}
          CDN_TOKEN: ${{ secrets.CDN_TOKEN }}
          CDN_ZONE_ID: ${{ secrets.CDN_ZONE_ID }}
          BLOCK_DEPLOY: ${{ secrets.BLOCK_DEPLOY }}
          BACKEND_TOKEN_KEY: ${{ secrets.BACKEND_TOKEN_KEY }}
          BACKEND_TOKEN_PASSWORD: ${{ secrets.BACKEND_TOKEN_PASSWORD }}
          SMTP_TLS_SELFSIGNED: ${{ secrets.SMTP_TLS_SELFSIGNED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PWD: ${{ secrets.SMTP_PWD }}
          LOG_BAN_IP: ${{ secrets.LOG_BAN_IP }}
          MMDB_TOKEN: ${{ secrets.MMDB_TOKEN }}
          remote_http_proxy: ${{ secrets.remote_http_proxy }}
          remote_https_proxy: ${{ secrets.remote_https_proxy }}
          remote_no_proxy: localhost
          NEW_RELIC_INGEST_KEY: ${{ secrets.NEW_RELIC_INGEST_KEY }}
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          MONITOR_BUCKET: ${{ secrets.MONITOR_BUCKET }}
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
