name: CD

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      git_branch:
        description: "Deployment branch/DNS target; keep dev for preprod"
        required: true
        default: "dev"
      remote_deploy_branch:
        description: "Branch cloned on the remote host; use PR branch before merge, dev after merge"
        required: false
        default: ""
      files_to_process:
        description: "Dataprep input files for the snapshot"
        required: true
        default: "deces-2020.txt.gz"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect artifact changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dataprep_backend: ${{ steps.filter.outputs.dataprep_backend }}
      dataprep_frontend: ${{ steps.filter.outputs.dataprep_frontend }}
      deces_backend: ${{ steps.filter.outputs.deces_backend }}
      deces_ui: ${{ steps.filter.outputs.deces_ui }}
      dataprep_snapshot: ${{ steps.filter.outputs.dataprep_snapshot }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dataprep_backend:
              - 'Makefile'
              - 'packages/dataprep-backend/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            dataprep_frontend:
              - 'Makefile'
              - 'packages/dataprep-frontend/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            deces_backend:
              - 'Makefile'
              - 'packages/deces-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            deces_ui:
              - 'Makefile'
              - 'packages/deces-ui/**'
              - 'packages/deces-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - '.github/workflows/cd.yml'
            dataprep_snapshot:
              - 'Makefile'
              - 'packages/deces-dataprep/**'
              - 'packages/dataprep-backend/**'
              - 'packages/deces-infra/**'
              - 'packages/tools/**'
              - 'scripts/**'
              - '.github/workflows/cd.yml'

  dataprep-backend:
    name: Publish matchid-backend image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.dataprep_backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build matchid-backend image
        run: make artifact-build-dataprep-backend GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
      - name: Publish matchid-backend image
        run: make artifact-publish-dataprep-backend GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: Publish legacy matchID package on master
        if: github.ref == 'refs/heads/master'
        run: make artifact-publish-legacy-package GIT_BRANCH=${GITHUB_REF_NAME}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}

  dataprep-frontend:
    name: Publish matchid-frontend image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.dataprep_frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build matchid-frontend image
        run: make artifact-build-dataprep-frontend GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
      - name: Publish matchid-frontend image
        run: make artifact-publish-dataprep-frontend GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  deces-backend:
    name: Publish deces-backend image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deces_backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build deces-backend image
        run: make artifact-build-deces-backend GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
      - name: Publish deces-backend image
        run: make artifact-publish-deces-backend GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  deces-ui:
    name: Publish deces-ui image
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.deces_ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build deces-ui image
        run: make artifact-build-deces-ui GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
      - name: Publish deces-ui image
        run: make artifact-publish-deces-ui GIT_BRANCH=${CD_GIT_BRANCH}
        env:
          CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  dataprep-snapshot:
    name: Publish dataprep snapshot
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.dataprep_snapshot == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      CD_GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
      FILES_TO_PROCESS: ${{ github.event.inputs.files_to_process || 'deces-2020.txt.gz' }}
      ES_COUNT_FILE: /tmp/dataprep-snapshot.count
      ES_SAMPLE_FILE: /tmp/dataprep-snapshot.sample.json
    steps:
      - uses: actions/checkout@v4
      - name: Select snapshot repository bucket
        run: |
          if [ "${CD_GIT_BRANCH}" = "master" ]; then
            echo "REPOSITORY_BUCKET=fichier-des-personnes-decedees-elasticsearch" >> "${GITHUB_ENV}"
          else
            echo "REPOSITORY_BUCKET=fichier-des-personnes-decedees-elasticsearch-dev" >> "${GITHUB_ENV}"
          fi
      - name: Produce dataprep snapshot
        run: make artifact-produce-dataprep-snapshot GIT_BRANCH=${CD_GIT_BRANCH} FILES_TO_PROCESS=${FILES_TO_PROCESS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET}
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Export dataprep snapshot metadata
        run: |
          make -C packages/deces-infra elasticsearch-index-export ES_INDEX=deces ES_COUNT_FILE=${ES_COUNT_FILE} ES_SAMPLE_FILE=${ES_SAMPLE_FILE} ES_SAMPLE_SIZE=25 ES_SAMPLE_SEED=424242
          SNAPSHOT_NAME=$(make artifact-version-dataprep-snapshot FILES_TO_PROCESS=${FILES_TO_PROCESS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET} | tail -1)
          {
            echo "snapshot_name=${SNAPSHOT_NAME}"
            echo "repository_bucket=${REPOSITORY_BUCKET}"
            echo "files_to_process=${FILES_TO_PROCESS}"
            echo "count=$(cat ${ES_COUNT_FILE})"
          } | tee /tmp/dataprep-snapshot-metadata.txt
      - name: Publish dataprep snapshot
        run: make artifact-publish-dataprep-snapshot GIT_BRANCH=${CD_GIT_BRANCH} FILES_TO_PROCESS=${FILES_TO_PROCESS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET}
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
      - name: Upload dataprep snapshot metadata
        uses: actions/upload-artifact@v4
        with:
          name: dataprep-snapshot-metadata
          path: |
            /tmp/dataprep-snapshot-metadata.txt
            /tmp/dataprep-snapshot.count
            /tmp/dataprep-snapshot.sample.json

  deploy-preprod:
    name: Deploy preprod
    needs:
      - changes
      - dataprep-backend
      - dataprep-frontend
      - deces-backend
      - deces-ui
      - dataprep-snapshot
    if: >-
      ${{
        always() &&
        (
          github.ref == 'refs/heads/dev' ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.event.inputs.git_branch == 'dev'
          )
        ) &&
        !cancelled() &&
        !failure() &&
        (
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.dataprep_backend == 'true' ||
          needs.changes.outputs.dataprep_frontend == 'true' ||
          needs.changes.outputs.deces_backend == 'true' ||
          needs.changes.outputs.deces_ui == 'true' ||
          needs.changes.outputs.dataprep_snapshot == 'true'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: preprod
    permissions:
      contents: read
    env:
      APP_DNS: deces.matchid.io
      REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch-dev
      GIT_BRANCH: ${{ github.event.inputs.git_branch || github.ref_name }}
      REMOTE_DEPLOY_BRANCH: ${{ github.event.inputs.remote_deploy_branch || github.ref_name }}
      FILES_TO_PROCESS: ${{ github.event.inputs.files_to_process || 'deces-2020.txt.gz' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install deploy SSH key
        run: |
          test -n "${SSH_PRIVATE_KEY}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa_matchID"
          chmod 600 "${HOME}/.ssh/id_rsa_matchID"
          ssh-keygen -y -f "${HOME}/.ssh/id_rsa_matchID" > "${HOME}/.ssh/id_rsa_matchID.pub"
          chmod 644 "${HOME}/.ssh/id_rsa_matchID.pub"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy dev-deces.matchid.io
        run: |
          make deploy-remote-preflight GIT_BRANCH=${GIT_BRANCH} REMOTE_DEPLOY_BRANCH=${REMOTE_DEPLOY_BRANCH} APP_DNS=${APP_DNS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET} FILES_TO_PROCESS=${FILES_TO_PROCESS}
          make deploy-remote GIT_BRANCH=${GIT_BRANCH} REMOTE_DEPLOY_BRANCH=${REMOTE_DEPLOY_BRANCH} APP_DNS=${APP_DNS} REPOSITORY_BUCKET=${REPOSITORY_BUCKET} FILES_TO_PROCESS=${FILES_TO_PROCESS}
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          TOOLS_STORAGE_ACCESS_KEY: ${{ secrets.TOOLS_STORAGE_ACCESS_KEY }}
          TOOLS_STORAGE_SECRET_KEY: ${{ secrets.TOOLS_STORAGE_SECRET_KEY }}
          LOG_BUCKET: ${{ secrets.LOG_BUCKET }}
          LOG_DB_BUCKET: ${{ secrets.LOG_DB_BUCKET }}
          STATS_BUCKET: ${{ secrets.STATS_BUCKET }}
          PROOFS_BUCKET: ${{ secrets.PROOFS_BUCKET }}
          SCW_SECRET_TOKEN: ${{ secrets.SCW_SECRET_TOKEN }}
          SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_IMAGE_ID: ${{ secrets.SCW_IMAGE_ID }}
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER }}
          CDN_TOKEN: ${{ secrets.CDN_TOKEN }}
          CDN_ZONE_ID: ${{ secrets.CDN_ZONE_ID }}
          BACKEND_TOKEN_KEY: ${{ secrets.BACKEND_TOKEN_KEY }}
          BACKEND_TOKEN_PASSWORD: ${{ secrets.BACKEND_TOKEN_PASSWORD }}
          NEW_RELIC_INGEST_KEY: ${{ secrets.NEW_RELIC_INGEST_KEY }}
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          MONITOR_BUCKET: ${{ secrets.MONITOR_BUCKET }}
