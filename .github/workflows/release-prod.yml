name: Release Prod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prod_tag:
        description: Prod tag to release
        required: true
        type: string

concurrency:
  group: release-prod-${{ github.event.inputs.prod_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  release-prod:
    name: Release prod
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      actions: read
      contents: read
    env:
      APP_DNS: deces.matchid.io
      PROD_REPOSITORY_BUCKET: fichier-des-personnes-decedees-elasticsearch
      BACKEND_JOB_CONCURRENCY_PROD: 6
      BACKEND_CHUNK_CONCURRENCY_PROD: 3
      ES_MEM_PROD: 8192m
      SCW_FLAVOR_PROD: GP1-XS
      SCW_VOLUME_SIZE_PROD: 60000000000
      SCW_VOLUME_TYPE_PROD: l_ssd
      DATAPREP_SCW_FLAVOR_PROD: PRO2-L
      DATAPREP_SCW_VOLUME_SIZE_PROD: 50000000000
      DATAPREP_SCW_VOLUME_TYPE_PROD: sbs_volume
      DATAPREP_CHUNK_SIZE_PROD: 75000
      DATAPREP_ES_THREADS_PROD: 30
      DATAPREP_RECIPE_THREADS_PROD: 32
      DATAPREP_RECIPE_QUEUE_PROD: 34
      DATAPREP_ES_MEM_PROD: 62000m
      DATAPREP_FILES_TO_PROCESS_PROD: 'deces-((19[7-9][0-9]|20(0[0-9]|1[0-9]|2[0-4]))|202[56]-m(0[1-9]|1[0-2]))\.txt\.gz'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.prod_tag || github.ref }}

      - name: Resolve prod tag context
        id: context
        env:
          INPUT_PROD_TAG: ${{ inputs.prod_tag }}
        run: |
          set -euo pipefail
          PROD_TAG="${INPUT_PROD_TAG:-${GITHUB_REF_NAME}}"
          case "${PROD_TAG}" in
            v*) ;;
            *)
              echo "prod tag must match v*"
              exit 1
              ;;
          esac
          git fetch --force --tags origin main
          TAG_SHA=$(git rev-list -n 1 "${PROD_TAG}")
          git merge-base --is-ancestor "${TAG_SHA}" origin/main
          PREVIOUS_PROD_TAG=$(git tag --list 'v*' --sort=-creatordate | grep -Fxv "${PROD_TAG}" | head -n 1 || true)
          COMMIT_SHORT=$(git rev-parse --short "${TAG_SHA}")
          DATAPREP_CHANGED=true
          if [ -n "${PREVIOUS_PROD_TAG}" ]; then
            if git diff --quiet "${PREVIOUS_PROD_TAG}" "${PROD_TAG}" -- \
              Makefile \
              packages/deces-dataprep \
              packages/dataprep-backend \
              packages/dataprep-frontend \
              packages/deces-infra \
              packages/tools \
              scripts; then
              DATAPREP_CHANGED=false
            fi
          fi
          {
            echo "prod_tag=${PROD_TAG}"
            echo "tag_sha=${TAG_SHA}"
            echo "commit_short=${COMMIT_SHORT}"
            echo "previous_prod_tag=${PREVIOUS_PROD_TAG}"
            echo "dataprep_changed=${DATAPREP_CHANGED}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve existing prod snapshot metadata
        id: snapshot
        if: steps.context.outputs.dataprep_changed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release-prod.yml/runs?status=completed&per_page=50" > /tmp/release-prod-runs.json
          PREVIOUS_RUN_ID=$(
            jq -r --argjson current "${GITHUB_RUN_ID}" '
              .workflow_runs[]
              | select(.id != $current and .conclusion == "success")
              | .id
            ' /tmp/release-prod-runs.json | head -n 1
          )
          if [ -z "${PREVIOUS_RUN_ID}" ]; then
            echo "run_full=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PREVIOUS_RUN_ID}/artifacts" > /tmp/release-prod-artifacts.json
          ARTIFACT_URL=$(
            jq -r '
              .artifacts[]
              | select(.name == "release-prod-metadata")
              | .archive_download_url
            ' /tmp/release-prod-artifacts.json | head -n 1
          )
          if [ -z "${ARTIFACT_URL}" ]; then
            echo "run_full=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${ARTIFACT_URL}" \
            -o /tmp/release-prod-metadata.zip
          unzip -p /tmp/release-prod-metadata.zip release-prod-metadata.txt > /tmp/release-prod-metadata.txt
          SNAPSHOT_NAME=$(sed -n 's/^snapshot_name=//p' /tmp/release-prod-metadata.txt)
          DATAPREP_VERSION=$(sed -n 's/^dataprep_version=//p' /tmp/release-prod-metadata.txt)
          DATA_VERSION=$(sed -n 's/^data_version=//p' /tmp/release-prod-metadata.txt)
          if [ -z "${SNAPSHOT_NAME}" ] || [ -z "${DATAPREP_VERSION}" ] || [ -z "${DATA_VERSION}" ]; then
            echo "run_full=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          {
            echo "run_full=false"
            echo "snapshot_name=${SNAPSHOT_NAME}"
            echo "dataprep_version=${DATAPREP_VERSION}"
            echo "data_version=${DATA_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve published image versions
        id: images
        run: |
          set -euo pipefail
          COMMIT_SHORT="${{ steps.context.outputs.commit_short }}"
          DATAPREP_BACKEND_IMAGE_VERSION=
          if [ "${{ steps.context.outputs.dataprep_changed }}" = "true" ] || [ "${{ steps.snapshot.outputs.run_full }}" = "true" ]; then
            CURRENT_DATAPREP_BACKEND_VERSION=$(make -s -C packages/dataprep-backend version GIT_BRANCH=master | awk '{print $NF}')
            DATAPREP_BACKEND_IMAGE_VERSION="${COMMIT_SHORT}-${CURRENT_DATAPREP_BACKEND_VERSION##*-}"
          fi
          {
            echo "deces_ui_image_version=${COMMIT_SHORT}"
            echo "deces_backend_image_version=${COMMIT_SHORT}"
            echo "dataprep_backend_image_version=${DATAPREP_BACKEND_IMAGE_VERSION}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install deploy SSH key
        run: |
          test -n "${SSH_PRIVATE_KEY}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/id_rsa_matchID"
          chmod 600 "${HOME}/.ssh/id_rsa_matchID"
          ssh-keygen -y -f "${HOME}/.ssh/id_rsa_matchID" > "${HOME}/.ssh/id_rsa_matchID.pub"
          chmod 644 "${HOME}/.ssh/id_rsa_matchID.pub"
          export SSH_AUTH_SOCK=/tmp/ssh_agent.sock
          ssh-agent -a "${SSH_AUTH_SOCK}" > /dev/null
          ssh-add "${HOME}/.ssh/id_rsa_matchID"
          sanitize_host() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#http://}"
            value="${value#https://}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value##*@}"; fi
            value="${value%%/*}"
            if [[ "${value}" =~ ^\[[^]]+\]:[0-9]+$ ]]; then
              value="${value#\[}"
              value="${value%%\]:*}"
            elif [[ "${value}" =~ ^[^:]+:[0-9]+$ ]]; then
              value="${value%%:*}"
            fi
            printf '%s' "${value}"
          }
          sanitize_user() {
            local value
            value="$(printf '%s' "$1" | tr -d '\r\n[:space:]')"
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            value="${value#ssh://}"
            if [[ "${value}" == *@* ]]; then value="${value%%@*}"; fi
            printf '%s' "${value}"
          }
          BASTION_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          BASTION_USER_RESOLVED=ubuntu
          NGINX_HOST_RESOLVED="$(sanitize_host "${NGINX_HOST}")"
          NGINX_USER_RESOLVED="$(sanitize_user "${NGINX_USER}")"
          if [ -z "${BASTION_HOST_RESOLVED}" ]; then BASTION_HOST_RESOLVED="$(sanitize_host "${BASTION_HOST}")"; fi
          if [ -z "${BASTION_USER_RESOLVED}" ]; then BASTION_USER_RESOLVED="$(sanitize_user "${BASTION_USER}")"; fi
          if [ -z "${NGINX_HOST_RESOLVED}" ]; then NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"; fi
          if [ -z "${NGINX_USER_RESOLVED}" ]; then NGINX_USER_RESOLVED=ubuntu; fi
          if ! getent hosts "${BASTION_HOST_RESOLVED}" >/dev/null 2>&1; then
            # Temporary fallback while monorepo runner secrets still expose a non-resolving bastion host.
            BASTION_HOST_RESOLVED=163.172.185.238
          fi
          # Current deploy topology publishes nginx through the bastion host.
          NGINX_HOST_RESOLVED="${BASTION_HOST_RESOLVED}"
          NGINX_USER_RESOLVED="${BASTION_USER_RESOLVED}"
          test -n "${BASTION_HOST_RESOLVED}"
          test -n "${BASTION_USER_RESOLVED}"
          test -n "${NGINX_HOST_RESOLVED}"
          test -n "${NGINX_USER_RESOLVED}"
          printf '%s\n' \
            "Host bastion" \
            "  HostName ${BASTION_HOST_RESOLVED}" \
            "  User ${BASTION_USER_RESOLVED}" \
            "  IdentityFile ${HOME}/.ssh/id_rsa_matchID" \
            "  IdentitiesOnly yes" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            "Host * !bastion" \
            "  ProxyJump bastion" \
            "  StrictHostKeyChecking no" \
            "  UserKnownHostsFile /dev/null" \
            > "${HOME}/.ssh/config"
          {
            echo "BASTION_HOST_RESOLVED=${BASTION_HOST_RESOLVED}"
            echo "BASTION_USER_RESOLVED=${BASTION_USER_RESOLVED}"
            echo "NGINX_HOST_RESOLVED=${NGINX_HOST_RESOLVED}"
            echo "NGINX_USER_RESOLVED=${NGINX_USER_RESOLVED}"
          } >> "${GITHUB_ENV}"
          chmod 600 "${HOME}/.ssh/config"
        env:
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER || 'ubuntu' }}
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Check dataprep full snapshot
        if: steps.context.outputs.dataprep_changed == 'true' || steps.snapshot.outputs.run_full == 'true'
        run: make -C packages/deces-dataprep clean full-check GIT_BRANCH=master REPOSITORY_BUCKET="${PROD_REPOSITORY_BUCKET}"
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}

      - name: Run dataprep full remote-all
        if: steps.context.outputs.dataprep_changed == 'true' || steps.snapshot.outputs.run_full == 'true'
        run: |
          make -C packages/deces-dataprep remote-all \
            GIT_BRANCH=master \
            REPOSITORY_BUCKET="${PROD_REPOSITORY_BUCKET}" \
            FILES_TO_PROCESS="${DATAPREP_FILES_TO_PROCESS_PROD}" \
            SCW_FLAVOR="${DATAPREP_SCW_FLAVOR_PROD}" SCW_VOLUME_SIZE="${DATAPREP_SCW_VOLUME_SIZE_PROD}" SCW_VOLUME_TYPE="${DATAPREP_SCW_VOLUME_TYPE_PROD}" \
            CHUNK_SIZE="${DATAPREP_CHUNK_SIZE_PROD}" ES_THREADS="${DATAPREP_ES_THREADS_PROD}" RECIPE_THREADS="${DATAPREP_RECIPE_THREADS_PROD}" ES_MEM="${DATAPREP_ES_MEM_PROD}" RECIPE_QUEUE="${DATAPREP_RECIPE_QUEUE_PROD}" \
            SLACK_TITLE="deces-dataprep - full" SLACK_WEBHOOK="${SLACK_WEBHOOK}" \
            REMOTE_TOOLS_REPOSITORY=matchID REMOTE_TOOLS_BRANCH="${PROD_TAG}" REMOTE_TOOLS_PATH=matchID/matchID REMOTE_TOOLS_MAKE_PATH=matchID/matchID/packages/tools \
            REMOTE_APP_REPOSITORY=matchID REMOTE_APP_BRANCH="${PROD_TAG}" REMOTE_APP_PATH=matchID/matchID REMOTE_APP_MAKE_PATH=matchID/matchID/packages/deces-dataprep \
            DATAPREP_BACKEND_MAKEOVERRIDES="APP_VERSION=${DATAPREP_BACKEND_IMAGE_VERSION}" \
            SSHKEY_PRIVATE="${HOME}/.ssh/id_rsa_matchID" \
            CLOUD_SSHOPTS="-J${BASTION_USER_RESOLVED}@${BASTION_HOST_RESOLVED}"
        env:
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          DATAPREP_BACKEND_IMAGE_VERSION: ${{ steps.images.outputs.dataprep_backend_image_version }}
          PROD_TAG: ${{ steps.context.outputs.prod_tag }}
          remote_http_proxy: ${{ secrets.remote_http_proxy }}
          remote_https_proxy: ${{ secrets.remote_https_proxy }}
          remote_no_proxy: localhost
          SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_SECRET_TOKEN: ${{ secrets.SCW_SECRET_TOKEN }}
          SCW_SERVER_OPTS: ${{ secrets.SCW_SERVER_OPTS }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Capture prod snapshot metadata
        if: steps.context.outputs.dataprep_changed == 'true' || steps.snapshot.outputs.run_full == 'true'
        run: |
          set -euo pipefail
          rm -f packages/deces-dataprep/repository-check
          for attempt in $(seq 1 12); do
            make -C packages/deces-dataprep repository-check GIT_BRANCH=master REPOSITORY_BUCKET="${PROD_REPOSITORY_BUCKET}"
            if test -s packages/deces-dataprep/repository-check; then
              break
            fi
            rm -f packages/deces-dataprep/repository-check
            sleep 5
          done
          test -s packages/deces-dataprep/repository-check
          SNAPSHOT_NAME=$(cat packages/deces-dataprep/repository-check)
          DATAPREP_VERSION=$(echo "${SNAPSHOT_NAME}" | sed -E 's/^esdata_([^_]+)_.*/\1/')
          DATA_VERSION=$(echo "${SNAPSHOT_NAME}" | sed -E 's/^esdata_[^_]+_([^_]+)$/\1/')
          {
            echo "SNAPSHOT_NAME=${SNAPSHOT_NAME}"
            echo "DATAPREP_VERSION=${DATAPREP_VERSION}"
            echo "DATA_VERSION=${DATA_VERSION}"
          } >> "${GITHUB_ENV}"
        env:
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}

      - name: Reuse current prod snapshot metadata
        if: steps.context.outputs.dataprep_changed != 'true' && steps.snapshot.outputs.run_full == 'false'
        run: |
          {
            echo "SNAPSHOT_NAME=${SNAPSHOT_NAME}"
            echo "DATAPREP_VERSION=${DATAPREP_VERSION}"
            echo "DATA_VERSION=${DATA_VERSION}"
          } >> "${GITHUB_ENV}"
        env:
          SNAPSHOT_NAME: ${{ steps.snapshot.outputs.snapshot_name }}
          DATAPREP_VERSION: ${{ steps.snapshot.outputs.dataprep_version }}
          DATA_VERSION: ${{ steps.snapshot.outputs.data_version }}

      - name: Deploy deces.matchid.io
        env:
          BASTION_HOST: ${{ secrets.BASTION_HOST || secrets.NGINX_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER || 'ubuntu' }}
          PROD_TAG: ${{ steps.context.outputs.prod_tag }}
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          GOOGLE_ADSENSE_ID: ${{ secrets.GOOGLE_ADSENSE_ID }}
          STORAGE_ACCESS_KEY: ${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          TOOLS_STORAGE_ACCESS_KEY: ${{ secrets.TOOLS_STORAGE_ACCESS_KEY }}
          TOOLS_STORAGE_SECRET_KEY: ${{ secrets.TOOLS_STORAGE_SECRET_KEY }}
          LOG_BUCKET: ${{ secrets.LOG_BUCKET }}
          LOG_DB_BUCKET: ${{ secrets.LOG_DB_BUCKET }}
          STATS_BUCKET: ${{ secrets.STATS_BUCKET }}
          PROOFS_BUCKET: ${{ secrets.PROOFS_BUCKET }}
          SCW_SECRET_TOKEN: ${{ secrets.SCW_SECRET_TOKEN }}
          SCW_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_IMAGE_ID: ${{ secrets.SCW_IMAGE_ID }}
          SCW_SERVER_OPTS: ${{ secrets.SCW_SERVER_OPTS }}
          SCW_PRIVATE_NETWORK_ID: ${{ secrets.SCW_PRIVATE_NETWORK_ID }}
          NGINX_HOST: ${{ secrets.NGINX_HOST }}
          NGINX_USER: ${{ secrets.NGINX_USER }}
          CDN_TOKEN: ${{ secrets.CDN_TOKEN }}
          CDN_ZONE_ID: ${{ secrets.CDN_ZONE_ID }}
          BLOCK_DEPLOY: ${{ secrets.BLOCK_DEPLOY }}
          BACKEND_TOKEN_KEY: ${{ secrets.BACKEND_TOKEN_KEY }}
          BACKEND_TOKEN_PASSWORD: ${{ secrets.BACKEND_TOKEN_PASSWORD }}
          SMTP_TLS_SELFSIGNED: ${{ secrets.SMTP_TLS_SELFSIGNED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PWD: ${{ secrets.SMTP_PWD }}
          LOG_BAN_IP: ${{ secrets.LOG_BAN_IP }}
          MMDB_TOKEN: ${{ secrets.MMDB_TOKEN }}
          remote_http_proxy: ${{ secrets.remote_http_proxy }}
          remote_https_proxy: ${{ secrets.remote_https_proxy }}
          remote_no_proxy: localhost
          NEW_RELIC_INGEST_KEY: ${{ secrets.NEW_RELIC_INGEST_KEY }}
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_API_KEY }}
          NEW_RELIC_ACCOUNT_ID: ${{ secrets.NEW_RELIC_ACCOUNT_ID }}
          MONITOR_BUCKET: ${{ secrets.MONITOR_BUCKET }}
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          DECES_UI_IMAGE_VERSION: ${{ steps.images.outputs.deces_ui_image_version }}
          DECES_BACKEND_IMAGE_VERSION: ${{ steps.images.outputs.deces_backend_image_version }}
        run: |
          make deploy-remote-preflight \
            GIT_BRANCH=master \
            APP_VERSION="${DECES_UI_IMAGE_VERSION}" \
            DECES_BACKEND_APP_VERSION="${DECES_BACKEND_IMAGE_VERSION}" \
            GIT_BACKEND_BRANCH=master \
            REMOTE_DEPLOY_BRANCH="${PROD_TAG}" \
            DEPLOY_TARGET=prod \
            APP_DNS="${APP_DNS}" \
            REPOSITORY_BUCKET="${PROD_REPOSITORY_BUCKET}" \
            DATAPREP_VERSION_OVERRIDE="${DATAPREP_VERSION}" \
            DATA_VERSION_OVERRIDE="${DATA_VERSION}" \
            SSHKEY_PRIVATE="${HOME}/.ssh/id_rsa_matchID" \
            CLOUD_SSHOPTS="-J${BASTION_USER_RESOLVED}@${BASTION_HOST_RESOLVED}"
          make deploy-remote \
            GIT_BRANCH=master \
            APP_VERSION="${DECES_UI_IMAGE_VERSION}" \
            DECES_BACKEND_APP_VERSION="${DECES_BACKEND_IMAGE_VERSION}" \
            GIT_BACKEND_BRANCH=master \
            REMOTE_DEPLOY_BRANCH="${PROD_TAG}" \
            DEPLOY_TARGET=prod \
            APP_DNS="${APP_DNS}" \
            REPOSITORY_BUCKET="${PROD_REPOSITORY_BUCKET}" \
            DATAPREP_VERSION_OVERRIDE="${DATAPREP_VERSION}" \
            DATA_VERSION_OVERRIDE="${DATA_VERSION}" \
            BACKEND_JOB_CONCURRENCY="${BACKEND_JOB_CONCURRENCY_PROD}" \
            BACKEND_CHUNK_CONCURRENCY="${BACKEND_CHUNK_CONCURRENCY_PROD}" \
            ES_MEM="${ES_MEM_PROD}" \
            SCW_FLAVOR="${SCW_FLAVOR_PROD}" SCW_VOLUME_SIZE="${SCW_VOLUME_SIZE_PROD}" SCW_VOLUME_TYPE="${SCW_VOLUME_TYPE_PROD}" \
            NGINX_USER="${NGINX_USER_RESOLVED}" NGINX_HOST="${NGINX_HOST_RESOLVED}" \
            SMTP_TLS_SELFSIGNED="${SMTP_TLS_SELFSIGNED}" SMTP_HOST="${SMTP_HOST}" SMTP_PORT="${SMTP_PORT}" SMTP_USER="${SMTP_USER}" SMTP_PWD="${SMTP_PWD}" \
            remote_http_proxy="${remote_http_proxy}" remote_https_proxy="${remote_https_proxy}" remote_no_proxy="${remote_no_proxy}" \
            GOOGLE_ANALYTICS_ID="${GOOGLE_ANALYTICS_ID}" GOOGLE_ADSENSE_ID="${GOOGLE_ADSENSE_ID}" \
            LOG_BAN_IP="${LOG_BAN_IP}" \
            MMDB_TOKEN="${MMDB_TOKEN}" \
            NEW_RELIC_API_KEY="${NEW_RELIC_API_KEY}" NEW_RELIC_ACCOUNT_ID="${NEW_RELIC_ACCOUNT_ID}" NEW_RELIC_INGEST_KEY="${NEW_RELIC_INGEST_KEY}" \
            SSHKEY_PRIVATE="${HOME}/.ssh/id_rsa_matchID" \
            CLOUD_SSHOPTS="-J${BASTION_USER_RESOLVED}@${BASTION_HOST_RESOLVED}"

      - name: Write release metadata artifact
        run: |
          cat <<EOF > /tmp/release-prod-metadata.txt
          prod_tag=${{ steps.context.outputs.prod_tag }}
          commit_sha=${{ steps.context.outputs.tag_sha }}
          snapshot_name=${SNAPSHOT_NAME}
          dataprep_version=${DATAPREP_VERSION}
          data_version=${DATA_VERSION}
          deces_ui_version=$(make package-version-deces-ui)
          deces_backend_version=$(make package-version-deces-backend)
          dataprep_backend_version=$(make package-version-dataprep-backend)
          dataprep_frontend_version=$(make package-version-dataprep-frontend)
          EOF

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-prod-metadata
          path: /tmp/release-prod-metadata.txt
